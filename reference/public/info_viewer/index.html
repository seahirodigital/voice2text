<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>info_viewer | 既存UI流用版</title>
  <meta name="description" content="既存 index.html の UI を流用した info_viewer 第一弾ダミー版" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f6f1e8;
      --bg-strong: #ece3d5;
      --surface: rgba(255, 251, 245, 0.88);
      --surface-strong: #fffaf2;
      --ink: #1f2a2c;
      --muted: #5b6768;
      --line: rgba(31, 42, 44, 0.12);
      --accent: #c85c3b;
      --accent-strong: #9e3f21;
      --accent-soft: rgba(200, 92, 59, 0.14);
      --deep: #24454c;
      --shadow: 0 18px 50px rgba(34, 46, 49, 0.14);
      --radius-lg: 28px;
      --radius-md: 20px;
      --radius-sm: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(36, 69, 76, 0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(200, 92, 59, 0.14), transparent 26%),
        linear-gradient(180deg, #f7f3eb 0%, #f2e8d9 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
    }

    .shell {
      min-height: 100vh;
      padding: 24px;
    }

    .app {
      max-width: 1680px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .hero {
      border: 1px solid var(--line);
      border-radius: 32px;
      background:
        linear-gradient(135deg, rgba(255, 250, 242, 0.98), rgba(250, 241, 229, 0.94)),
        linear-gradient(135deg, rgba(36, 69, 76, 0.04), rgba(200, 92, 59, 0.04));
      box-shadow: var(--shadow);
      padding: 22px 24px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: '';
      position: absolute;
      inset: auto -8% -50% auto;
      width: 280px;
      height: 280px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(200, 92, 59, 0.18), transparent 68%);
      pointer-events: none;
    }

    .hero-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(36, 69, 76, 0.08);
      color: var(--deep);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .hero h1 {
      margin: 14px 0 10px;
      font-family: 'Space Grotesk', 'Noto Sans JP', sans-serif;
      font-size: clamp(32px, 4vw, 54px);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .hero p {
      margin: 0;
      max-width: 780px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 14px;
    }

    .hero-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .hero-link,
    .hero-ghost,
    .mobile-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 999px;
      padding: 11px 16px;
      font-size: 13px;
      font-weight: 700;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .hero-link {
      background: var(--deep);
      color: #fff8f2;
      box-shadow: 0 10px 26px rgba(36, 69, 76, 0.22);
    }

    .hero-link:hover,
    .mobile-button:hover {
      transform: translateY(-1px);
    }

    .hero-ghost,
    .mobile-button {
      background: rgba(255, 255, 255, 0.6);
      border-color: var(--line);
      color: var(--ink);
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .stat {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.58);
      border-radius: 18px;
      padding: 16px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .stat-value {
      margin-top: 10px;
      font-family: 'Space Grotesk', 'Noto Sans JP', sans-serif;
      font-size: clamp(22px, 3vw, 34px);
      letter-spacing: -0.04em;
    }

    .layout {
      display: grid;
      grid-template-columns: 292px 372px minmax(0, 1fr);
      gap: 18px;
      min-height: calc(100vh - 260px);
    }

    .pane {
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--surface);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .pane-head {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 253, 249, 0.96), rgba(255, 251, 245, 0.7));
    }

    .pane-title {
      margin: 0;
      font-family: 'Space Grotesk', 'Noto Sans JP', sans-serif;
      font-size: 20px;
      letter-spacing: -0.03em;
    }

    .pane-subtitle {
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .pane-body {
      padding: 12px;
      overflow: auto;
      min-height: 0;
    }

    .channel-list,
    .video-list {
      display: grid;
      gap: 10px;
    }

    .channel-card,
    .video-card {
      width: 100%;
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      padding: 16px;
      background: transparent;
      color: inherit;
      text-align: left;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
      cursor: pointer;
    }

    .channel-card:hover,
    .video-card:hover {
      background: rgba(255, 255, 255, 0.7);
      border-color: rgba(36, 69, 76, 0.14);
      transform: translateY(-1px);
    }

    .channel-card.active,
    .video-card.active {
      background: linear-gradient(135deg, rgba(36, 69, 76, 0.94), rgba(47, 82, 90, 0.94));
      color: #fef8f0;
      box-shadow: 0 14px 30px rgba(36, 69, 76, 0.2);
    }

    .channel-card.active .meta,
    .video-card.active .meta,
    .channel-card.active .micro,
    .video-card.active .micro,
    .channel-card.active .status-pill,
    .video-card.active .status-pill {
      color: #d9e6e7;
      border-color: rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
    }

    .card-title {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.5;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .micro-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .micro,
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      border: 1px solid rgba(36, 69, 76, 0.12);
      background: rgba(255, 255, 255, 0.72);
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
    }

    .status-ready {
      color: var(--accent-strong);
      background: var(--accent-soft);
      border-color: rgba(200, 92, 59, 0.24);
    }

    .status-pending {
      color: var(--deep);
      background: rgba(36, 69, 76, 0.08);
      border-color: rgba(36, 69, 76, 0.14);
    }

    .empty-note {
      border: 1px dashed rgba(36, 69, 76, 0.18);
      border-radius: var(--radius-md);
      padding: 18px;
      color: var(--muted);
      line-height: 1.8;
      background: rgba(255, 255, 255, 0.42);
    }

    .content-shell {
      display: flex;
      flex-direction: column;
      min-height: 0;
      height: 100%;
    }

    .article-bar {
      padding: 22px 24px 18px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(255, 251, 243, 0.98), rgba(255, 246, 236, 0.82));
    }

    .article-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 12px;
      font-weight: 700;
    }

    .article-title {
      margin: 14px 0 0;
      font-family: 'Space Grotesk', 'Noto Sans JP', sans-serif;
      font-size: clamp(28px, 3.6vw, 44px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .article-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .article-body {
      padding: 26px 28px 42px;
      overflow: auto;
      min-height: 0;
    }

    .article-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .article-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 11px 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.66);
      font-size: 13px;
      font-weight: 700;
    }

    .article-link.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fffaf5;
    }

    .article-placeholder {
      border: 1px dashed rgba(200, 92, 59, 0.24);
      border-radius: 26px;
      padding: 26px;
      background: linear-gradient(180deg, rgba(255, 250, 244, 0.96), rgba(255, 245, 238, 0.82));
    }

    .article-placeholder h3 {
      margin: 0;
      font-family: 'Space Grotesk', 'Noto Sans JP', sans-serif;
      font-size: 28px;
      letter-spacing: -0.03em;
    }

    .article-placeholder p {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.9;
      font-size: 14px;
    }

    .markdown {
      color: var(--ink);
      line-height: 1.9;
      font-size: 15px;
    }

    .markdown>*:first-child {
      margin-top: 0;
    }

    .markdown h1,
    .markdown h2,
    .markdown h3 {
      font-family: 'Space Grotesk', 'Noto Sans JP', sans-serif;
      letter-spacing: -0.03em;
      line-height: 1.15;
    }

    .markdown h1 {
      font-size: 34px;
      margin: 0 0 22px;
    }

    .markdown h2 {
      margin: 34px 0 16px;
      font-size: 24px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(36, 69, 76, 0.12);
    }

    .markdown h3 {
      margin: 24px 0 12px;
      font-size: 18px;
    }

    .markdown p {
      margin: 12px 0;
    }

    .markdown ul,
    .markdown ol {
      margin: 14px 0;
      padding-left: 22px;
    }

    .markdown li {
      margin: 8px 0;
    }

    .markdown blockquote {
      margin: 20px 0;
      padding: 14px 18px;
      border-left: 4px solid var(--accent);
      border-radius: 0 16px 16px 0;
      background: rgba(200, 92, 59, 0.08);
      color: var(--accent-strong);
    }

    .markdown code {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.9em;
      background: rgba(36, 69, 76, 0.08);
      padding: 2px 6px;
      border-radius: 8px;
    }

    .markdown pre {
      overflow: auto;
      padding: 16px;
      border-radius: 18px;
      background: #1f2a2c;
      color: #f7efe5;
    }

    .markdown pre code {
      background: transparent;
      padding: 0;
      color: inherit;
    }

    .markdown a {
      color: var(--accent-strong);
      font-weight: 700;
    }

    .mobile-tools {
      display: none;
      gap: 10px;
      flex-wrap: wrap;
    }

    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(19, 28, 30, 0.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
      z-index: 60;
    }

    .drawer-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: min(92vw, 420px);
      background: #fffaf2;
      border-right: 1px solid var(--line);
      box-shadow: 0 18px 42px rgba(24, 33, 34, 0.24);
      transform: translateX(-100%);
      transition: transform 0.26s ease;
      z-index: 70;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-head {
      padding: 20px;
      border-bottom: 1px solid var(--line);
    }

    .drawer-tabs {
      display: flex;
      gap: 8px;
      padding: 14px 20px 0;
    }

    .drawer-tab {
      flex: 1;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.7);
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
    }

    .drawer-tab.active {
      background: var(--deep);
      border-color: var(--deep);
      color: #fff8f2;
    }

    .drawer-body {
      min-height: 0;
      overflow: auto;
      padding: 14px;
    }

    .drawer-panel {
      display: none;
    }

    .drawer-panel.active {
      display: block;
    }

    @media (max-width: 1180px) {
      .layout {
        grid-template-columns: 250px 320px minmax(0, 1fr);
      }
    }

    @media (max-width: 980px) {
      .shell {
        padding: 16px;
      }

      .hero {
        padding: 18px;
        border-radius: 26px;
      }

      .hero-stats {
        grid-template-columns: 1fr;
      }

      .layout {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .layout .pane.channel-pane,
      .layout .pane.video-pane {
        display: none;
      }

      .layout .pane.content-pane {
        min-height: calc(100vh - 280px);
      }

      .mobile-tools {
        display: flex;
      }

      .article-bar {
        padding: 18px;
      }

      .article-body {
        padding: 22px 18px 34px;
      }
    }

    body > .shell,
    body > .drawer-overlay,
    body > .drawer {
      display: none !important;
    }

    #root {
      display: block;
      height: 100vh;
    }

    body {
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      background: #f8fafc;
      color: #334155;
    }

    .resize-handle {
      width: 14px;
      background: transparent;
      cursor: col-resize;
      flex-shrink: 0;
      position: relative;
      transition: background 0.15s;
      z-index: 10;
    }

    .resize-handle:hover,
    .resize-handle.dragging {
      background: #7C4DFF;
    }

    .resize-handle::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 3px;
      height: 40px;
      border-radius: 9999px;
      background: #cbd5e1;
      transition: background 0.15s;
    }

    .resize-handle:hover::after,
    .resize-handle.dragging::after {
      background: #7C4DFF;
    }

    .sidebar-resize-handle {
      width: 14px;
      background: transparent;
      cursor: col-resize;
      flex-shrink: 0;
      position: relative;
      transition: background 0.15s;
      z-index: 10;
    }

    .sidebar-resize-handle:hover,
    .sidebar-resize-handle.dragging {
      background: #7C4DFF22;
    }

    .sidebar-resize-handle::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 3px;
      height: 40px;
      border-radius: 9999px;
      background: #cbd5e1;
      transition: background 0.15s;
    }

    .sidebar-resize-handle:hover::after,
    .sidebar-resize-handle.dragging::after {
      background: #7C4DFF;
    }

    .article-item {
      background: #ffffff;
      border: 1px solid transparent;
      transition: background 0.18s, color 0.18s, border-color 0.18s, box-shadow 0.18s, transform 0.18s;
    }

    .article-item:hover {
      background: #ffffff;
      border-color: #e2e8f0;
    }

    .article-item.active {
      background: #ffffff;
      color: #7C4DFF;
      border-color: #d9ccff;
      box-shadow: 0 10px 24px rgba(124, 77, 255, 0.12);
    }

    .article-item.active .article-date {
      color: #7C4DFF;
      font-weight: 600;
    }

    .article-item.active .article-title-text {
      color: #7C4DFF;
      font-weight: 700;
    }

    .panel-toggle-button {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      width: 24px;
      height: 24px;
      border-radius: 9999px;
      border: 1px solid #d9ccff;
      background: #ffffff;
      color: #7C4DFF;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 24px rgba(124, 77, 255, 0.18);
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      z-index: 11;
    }

    .panel-toggle-button:hover {
      background: #f5f3ff;
      transform: translateX(-50%) scale(1.06);
      box-shadow: 0 14px 28px rgba(124, 77, 255, 0.24);
    }

    .mobile-swipe-surface {
      touch-action: pan-y;
    }

    .mobile-drawer {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 280px;
      z-index: 50;
      background: white;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.2);
      transform: translateX(-100%);
      transition: transform 0.25s ease;
    }

    .mobile-drawer.open {
      transform: translateX(0);
    }

    .mobile-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 40;
    }

    .tab-active {
      border-bottom: 3px solid #7C4DFF;
      color: #7C4DFF;
      font-weight: 600;
    }

    .markdown-preview h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1e293b;
      margin: 1.5rem 0 0.75rem;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 0.5rem;
    }

    .markdown-preview h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1e293b;
      margin: 1.25rem 0 0.5rem;
    }

    .markdown-preview h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #334155;
      margin: 1rem 0 0.4rem;
    }

    .markdown-preview p {
      margin: 0.7rem 0;
      line-height: 1.85;
    }

    .markdown-preview ul {
      margin: 0.7rem 0;
      padding-left: 0;
      list-style-type: none;
    }

    .markdown-preview ol {
      margin: 0.7rem 0;
      padding-left: 1.5rem;
    }

    .markdown-preview ul > li {
      margin: 0.35rem 0;
      line-height: 1.7;
      padding-left: 1.2rem;
      position: relative;
    }

    .markdown-preview ul > li::before {
      content: '・';
      position: absolute;
      left: 0;
      color: #475569;
    }

    .markdown-preview ol li {
      margin: 0.35rem 0;
      line-height: 1.7;
    }

    .markdown-preview blockquote {
      border-left: 4px solid #7C4DFF;
      background: #f5f3ff;
      padding: 0.75rem 1rem;
      margin: 0.75rem 0;
      border-radius: 0 0.5rem 0.5rem 0;
      color: #4c1d95;
    }

    .markdown-preview code {
      background: #f1f5f9;
      padding: 0.1rem 0.35rem;
      border-radius: 0.25rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: #7C4DFF;
    }

    .markdown-preview pre {
      background: #1e293b;
      color: #e2e8f0;
      padding: 1rem;
      border-radius: 0.75rem;
      overflow-x: auto;
      margin: 1rem 0;
    }

    .markdown-preview pre code {
      background: none;
      color: inherit;
      padding: 0;
    }

    .markdown-preview table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
    }

    .markdown-preview th {
      background: #f8fafc;

      if (!dateText) return '日付未設定';
      const date = new Date(dateText);
      if (Number.isNaN(date.getTime())) return dateText;
      return new Intl.DateTimeFormat('ja-JP', {

        month: 'long',
        day: 'numeric'
      }).format(date);

    function formatDateTime(dateText) {
      if (!dateText) return '未生成';
      const date = new Date(dateText);
      if (Number.isNaN(date.getTime())) return dateText;
      return new Intl.DateTimeFormat('ja-JP', {
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      }).format(date);
    }

      articleBody.innerHTML = `<div class="markdown">${marked.parse(video.articleMarkdown)}</div>`;

    function selectChannel(channelId) {
      const channel = dataset.find((item) => item.id === channelId);

      state.selectedChannelId = channel.id;

    }

    function setDrawerTab(tab) {
      state.drawerTab = tab;
      drawerTabs.forEach((button) => {

      });
      document.getElementById('drawerChannels').classList.toggle('active', tab === 'channels');

    }

    function openDrawer(tab) {
      setDrawerTab(tab);
      state.drawerOpen = true;
      drawer.classList.add('open');
      drawerOverlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeDrawer() {
      state.drawerOpen = false;
      drawer.classList.remove('open');
      drawerOverlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    function render() {
      renderStats();
      renderChannels(channelList);
      renderVideos(videoList);
      renderChannels(drawerChannels);
      renderVideos(drawerVideos);
      renderArticle();
    }

    drawerTabs.forEach((button) => {
      button.addEventListener('click', () => setDrawerTab(button.dataset.tab));
    });

    document.getElementById('openChannels').addEventListener('click', () => openDrawer('channels'));
    document.getElementById('openVideos').addEventListener('click', () => openDrawer('videos'));
    document.getElementById('closeDrawer').addEventListener('click', closeDrawer);
    drawerOverlay.addEventListener('click', closeDrawer);

    render();

      function formatDate(dateText) {
        if (!dateText) return '日付未設定';
        const date = new Date(dateText);
        if (Number.isNaN(date.getTime())) return dateText;
        return date.toLocaleDateString('ja-JP');
      }

      function resolveVideoUpdatedAt(video) {
        return video?.videoUpdatedAt || video?.publishedAt || '';
      }

      function parseViewerDate(dateText) {
        const raw = String(dateText || '').trim();
        if (!raw) return null;

        const direct = new Date(raw);
        if (!Number.isNaN(direct.getTime())) {
          return direct;
        }

        const matched = raw.match(/^(\d{4})[/-](\d{1,2})[/-](\d{1,2})(?:[\/\sT](\d{1,2}):(\d{2})(?::(\d{2}))?)?$/);
        if (!matched) {
          return null;
        }

        const [, year, month, day, hour = '0', minute = '0', second = '0'] = matched;
        const parsed = new Date(
          Number(year),
          Number(month) - 1,
          Number(day),
          Number(hour),
          Number(minute),
          Number(second)
        );
        if (Number.isNaN(parsed.getTime())) {
          return null;
        }
        return parsed;
      }

      function formatVideoTimestamp(dateText) {
        if (!dateText) return '日時未設定';

        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const hour = String(date.getHours()).padStart(2, '0');
        const minute = String(date.getMinutes()).padStart(2, '0');
        return `${year}/${month}/${day}/${hour}:${minute}`;
      }

            const response = await fetch(`/api/info-viewer?ts=${Date.now()}`, { cache: 'no-store' });
            if (!response.ok) {
              throw new Error(`index API ${response.status}`);
            }

            const payload = await response.json();
            const normalized = normalizeApiPayload(payload) || [];
            const nextGeneratedAt = payload?.generatedAt || '';
            setManifestGeneratedAt(nextGeneratedAt);

            if (normalized.length) {
              const currentChannelId = preserveSelection ? selectedChannelIdRef.current : '';
              const currentVideoId = preserveSelection ? selectedVideoIdRef.current : '';
              const owningChannel = normalized.find((channel) => channel.id === currentChannelId || channel.videos.some((video) => video.id === currentVideoId)) || normalized[0];
              const nextChannelId = owningChannel?.id || normalized[0].id;
              const nextVideoId = owningChannel?.videos.some((video) => video.id === currentVideoId)
                ? currentVideoId
                : owningChannel?.videos[0]?.id || normalized[0].videos[0]?.id || '';

              setChannels(normalized);
              setSelectedChannelId(nextChannelId);
              setSelectedVideoId(nextVideoId);
              setDataSource('api');
              setIndexError('');
              return { ok: true, generatedAt: nextGeneratedAt, hasContent: true };
            }

            setChannels([]);
            setSelectedChannelId('');
            setSelectedVideoId('');
            setDataSource('empty');
            setIndexError(payload?.source === 'manifest_missing' ? 'manifest はまだ生成されていません。' : '');
            return { ok: true, generatedAt: nextGeneratedAt, hasContent: false };
          } catch (error) {
            setDataSource('error');
            setIndexError(error.message || '実データの読み込みに失敗しました。');
            return { ok: false, generatedAt: '', hasContent: false };
          } finally {
            if (!silent) {
              setLoadingIndex(false);
            }
          }
        }, []);

        useEffect(() => {
          loadIndex({ preserveSelection: false });
        }, [loadIndex]);

        const allVideos = useMemo(
          () => channels.flatMap((channel) => channel.videos.map((video) => ({
            ...video,
            channelId: channel.id,
            channelName: channel.name,
            channelUrl: channel.channelUrl
          }))),
          [channels]
        );

        const allVideosByDate = useMemo(
          () => [...allVideos].sort((a, b) => getVideoSortTimestamp(b) - getVideoSortTimestamp(a)),
          [allVideos]
        );

        const latestVideos = useMemo(
          () => allVideosByDate.filter((video) => Boolean(video.markdown || video.articleId || video.hasArticle)),
          [allVideosByDate]
        );

        const selectedChannel = useMemo(
          () => channels.find((channel) => channel.id === selectedChannelId) || channels[0] || { id: '', name: '', channelUrl: '', videos: [] },
          [channels, selectedChannelId]
        );

        const desktopVideos = useMemo(
          () => (desktopVideoFilter === 'latest' ? latestVideos : selectedChannel.videos),
          [desktopVideoFilter, latestVideos, selectedChannel.videos]
        );

        const currentVideoList = useMemo(() => {
          if (typeof window !== 'undefined' && window.innerWidth < 1024) {
            if (mobilePanel === 'latest') return latestVideos;
            if (mobilePanel === 'videos') return selectedChannel.videos;
            return [];
          }
          return desktopVideoFilter === 'latest' ? latestVideos : selectedChannel.videos;
        }, [desktopVideoFilter, latestVideos, mobilePanel, selectedChannel.videos]);

        const selectedVideo = useMemo(
          () => selectedChannel.videos.find((video) => video.id === selectedVideoId) || selectedChannel.videos[0] || {
            id: '',
            articleId: '',
            title: '動画がありません',
            publishedAt: '',
            videoUpdatedAt: '',
            duration: '',
            thumbnailUrl: '',
            youtubeUrl: '#',
            articleWebUrl: '',
            articleStatus: '未生成',
            markdown: '',
            hasArticle: false,
            queueStatus: '',
            queueNextRetryAt: '',
            manualPriorityAt: '',
            lastFailureStage: '',
            lastFailureMessage: '',
            lastFailureAt: ''
          },
          [selectedChannel, selectedVideoId]
        );

        const selectedMarkdown = useMemo(
          () => selectedVideo?.markdown || (selectedVideo?.articleId ? articleCache[selectedVideo.articleId] || '' : ''),
          [articleCache, selectedVideo]
        );

        const renderedHTML = useMemo(
          () => selectedMarkdown ? marked.parse(selectedMarkdown) : '',
          [selectedMarkdown]
        );

        const handleSelectChannel = useCallback((channelId) => {
          const channel = channels.find((item) => item.id === channelId);
          if (!channel) return;
          setSelectedChannelId(channelId);
          setSelectedVideoId(channel.videos[0]?.id || null);
        }, [channels]);

        const handleMobileSelectChannel = useCallback((channelId) => {
          handleSelectChannel(channelId);
          setMobilePanel('videos');
        }, [handleSelectChannel]);

        const handleSelectVideoAcrossChannels = useCallback((channelId, videoId) => {
          setSelectedChannelId(channelId);
          setSelectedVideoId(videoId);
        }, []);

        const handleSelectLatestArticle = useCallback((channelId, videoId) => {
          handleSelectVideoAcrossChannels(channelId, videoId);
          setMobileSidebarOpen(false);
        }, [handleSelectVideoAcrossChannels]);

        const handleToggleVideoSelection = useCallback((videoId) => {
          setSelectedVideoIds((current) => {
            const next = new Set(current);
            if (next.has(videoId)) {
              next.delete(videoId);
            } else {
              next.add(videoId);
            }
            return next;
          });
        }, []);

        const handleRangeSelect = useCallback((fromId, toId) => {
          const ids = currentVideoList.map((video) => video.id);
          const fromIndex = ids.indexOf(fromId);
          const toIndex = ids.indexOf(toId);
          if (fromIndex === -1 || toIndex === -1) return;
          const [start, end] = fromIndex < toIndex ? [fromIndex, toIndex] : [toIndex, fromIndex];
          setSelectedVideoIds(new Set(ids.slice(start, end + 1)));
        }, [currentVideoList]);

        const handleVideoClick = useCallback((video, event, mode = 'single') => {
          const selectVideo = () => {
            if (mode === 'latest') {
              handleSelectVideoAcrossChannels(video.channelId, video.id);
            } else {
              setSelectedVideoId(video.id);
            }
          };

          if (event?.shiftKey && lastClickedVideoIdRef.current) {
            handleRangeSelect(lastClickedVideoIdRef.current, video.id);
            selectVideo();
            return;
          }

          if (event?.metaKey || event?.ctrlKey) {
            handleToggleVideoSelection(video.id);
            lastClickedVideoIdRef.current = video.id;
            selectVideo();
            return;
          }

          lastClickedVideoIdRef.current = video.id;
          if (selectedVideoIds.size > 0) {
            setSelectedVideoIds(new Set());
          }
          selectVideo();
        }, [handleRangeSelect, handleSelectVideoAcrossChannels, handleToggleVideoSelection, selectedVideoIds.size]);

        const handleVideoContextMenu = useCallback((event, video) => {
          event.preventDefault();
          event.stopPropagation();
          const menuWidth = 188;
          const menuHeight = 146;
          const x = Math.min(event.clientX, window.innerWidth - menuWidth - 8);
          const y = Math.min(event.clientY, window.innerHeight - menuHeight - 8);
          setVideoContextMenu({ visible: true, x, y, video });
          if (video?.channelId) {
            handleSelectVideoAcrossChannels(video.channelId, video.id);
          } else if (video?.id) {
            setSelectedVideoId(video.id);
          }
        }, [handleSelectVideoAcrossChannels]);

        const updateVideoInChannels = useCallback((videoId, updater) => {
          setChannels((currentChannels) => currentChannels.map((channel) => ({
            ...channel,
            videos: channel.videos.map((video) => {
              if (video.id !== videoId) return video;
              const patch = typeof updater === 'function' ? updater(video) : updater;
              return { ...video, ...patch };
            })
          })));
        }, []);

        const handlePrioritizeVideo = useCallback(async (video) => {
          if (!video?.youtubeUrl || priorityLoadingId) return;

          try {
            setPriorityLoadingId(video.id);
            const response = await fetch('/api/info-viewer?resource=priority', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                video_url: video.youtubeUrl,
                title: video.title,
                channelName: video.channelName || selectedChannel.name,
                channelUrl: video.channelUrl || selectedChannel.channelUrl,
                publishedAt: video.publishedAt,
                videoUpdatedAt: resolveVideoUpdatedAt(video),
                duration: video.duration,
                thumbnailUrl: video.thumbnailUrl || resolveThumbnailUrl(video),
                sheetStatus: video.sheetStatus || '',
                lastFailureStage: video.lastFailureStage,
                lastFailureMessage: video.lastFailureMessage,
                lastFailureAt: video.lastFailureAt,
                queueAttemptCount: video.queueAttemptCount || 0,
              }),
            });
            const payload = await response.json();
            if (!response.ok || payload.success === false) {
              throw new Error(payload.error || `priority API ${response.status}`);
            }

            updateVideoInChannels(video.id, {
              queueStatus: 'pending',
              queueNextRetryAt: payload.manualPriorityAt || new Date().toISOString(),
              manualPriorityAt: payload.manualPriorityAt || new Date().toISOString(),
            });

            if (payload.warning) {
              setIndexError(payload.warning);
            }
          } catch (error) {
            setIndexError(error.message || '最優先化に失敗しました');
          } finally {
            setPriorityLoadingId('');
          }
        }, [priorityLoadingId, selectedChannel.channelUrl, selectedChannel.name, updateVideoInChannels]);

        const waitFor = useCallback((ms) => new Promise((resolve) => window.setTimeout(resolve, ms)), []);

        const waitForFreshManifest = useCallback(async (previousGeneratedAt) => {
          for (let attempt = 0; attempt < 8; attempt += 1) {
            await waitFor(attempt === 0 ? 1600 : 2200);
            const result = await loadIndex({ preserveSelection: true, silent: true });
            if (!result.ok) {
              continue;
            }
            if (!previousGeneratedAt || (result.generatedAt && result.generatedAt !== previousGeneratedAt)) {
              setLoadingIndex(false);
              return true;
            }
          }
          return false;
        }, [loadIndex, waitFor]);

        const handleRefreshSheet = useCallback(async () => {
          if (refreshingSheet) return;

          try {
            setRefreshingSheet(true);
            setLoadingIndex(true);
            setIndexError('');
            const response = await fetch('/api/trigger-info-viewer', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                mode: 'sync_only',
                max_items: '0',
              }),
            });
            const payload = await response.json();
            if (!response.ok || payload.success === false) {
              throw new Error(payload.error || `trigger API ${response.status}`);
            }

            const refreshed = await waitForFreshManifest(manifestGeneratedAt);
            if (!refreshed) {
              await loadIndex({ preserveSelection: true, silent: true });
              setIndexError('スプレッドシート再読込を開始しました。数秒後に再度ご確認ください。');
            }
          } catch (error) {
            setIndexError(error.message || 'スプレッドシートの更新に失敗しました。');
          } finally {
            setRefreshingSheet(false);
            setLoadingIndex(false);
          }
        }, [loadIndex, manifestGeneratedAt, refreshingSheet, waitForFreshManifest]);

        const handleDeleteVideo = useCallback(async (video) => {
          if (!video?.articleId) {
            setIndexError('削除できる OneDrive 記事が見つかりません。');
            return;
          }
          if (!window.confirm(`「${video.title || 'この記事'}」を削除します。\nこの操作は取り消せません。`)) {
            return;
          }

          try {
            setLoadingIndex(true);
            setIndexError('');
            setVideoContextMenu((current) => ({ ...current, visible: false }));
            const response = await fetch('/api/info-viewer?resource=article', {
              method: 'DELETE',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ articleId: video.articleId }),
            });
            const payload = await response.json();
            if (!response.ok || payload.success === false) {
              throw new Error(payload.error || `delete API ${response.status}`);
            }

            setArticleCache((current) => {
              const next = { ...current };
              delete next[video.articleId];
              return next;
            });
            setSelectedVideoIds((current) => {
              const next = new Set(current);
              next.delete(video.id);
              return next;
            });

            const triggerResponse = await fetch('/api/trigger-info-viewer', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                mode: 'rebuild_manifest_only',
                max_items: '0',
                rebuild_manifest_only: true,
              }),
            });
            const triggerPayload = await triggerResponse.json();
            if (!triggerResponse.ok || triggerPayload.success === false) {
              throw new Error(triggerPayload.error || `trigger API ${triggerResponse.status}`);
            }

            const refreshed = await waitForFreshManifest(manifestGeneratedAt);
            if (!refreshed) {
              await loadIndex({ preserveSelection: true, silent: true });
              setIndexError('削除後の manifest 再読込に少し時間がかかっています。数秒後に再読込してください。');
            }
          } catch (error) {
            setIndexError(error.message || '記事削除に失敗しました。');
          } finally {
            setLoadingIndex(false);
          }
        }, [loadIndex, manifestGeneratedAt, waitForFreshManifest]);

        const handleOpenInOneDrive = useCallback((video) => {
          const target = video?.articleWebUrl || '';
          if (!target) {
            setIndexError('OneDrive の記事 URL が見つかりません。');
            return;
          }
          window.open(target, '_blank', 'noopener,noreferrer');
          setVideoContextMenu((current) => ({ ...current, visible: false }));
        }, []);

        const swipeSequence = useMemo(() => {
          const isCurrentInLatest = latestVideos.some((video) => video.id === selectedVideoId);
          return isCurrentInLatest ? latestVideos : allVideosByDate;
        }, [allVideosByDate, latestVideos, selectedVideoId]);

        const moveBySwipe = useCallback((direction) => {
          if (typeof window !== 'undefined' && window.innerWidth >= 1024) return;
          const currentIndex = swipeSequence.findIndex((video) => video.id === selectedVideoId);
          if (currentIndex === -1) return;
          const nextIndex = direction === 'next' ? currentIndex + 1 : currentIndex - 1;
          const nextVideo = swipeSequence[nextIndex];
          if (!nextVideo) return;
          handleSelectVideoAcrossChannels(nextVideo.channelId, nextVideo.id);
        }, [handleSelectVideoAcrossChannels, selectedVideoId, swipeSequence]);

        useEffect(() => {
          if (desktopVideoFilter !== 'latest' || !latestVideos.length) return;
          if (latestVideos.some((video) => video.id === selectedVideoId)) return;
          handleSelectVideoAcrossChannels(latestVideos[0].channelId, latestVideos[0].id);
        }, [desktopVideoFilter, handleSelectVideoAcrossChannels, latestVideos, selectedVideoId]);

        const handlePreviewTouchStart = useCallback((event) => {
          if (typeof window !== 'undefined' && window.innerWidth >= 1024) return;
          const touch = event.touches[0];
          touchStartX.current = touch.clientX;
          touchStartY.current = touch.clientY;
        }, []);

        const handlePreviewTouchEnd = useCallback((event) => {
          if (typeof window !== 'undefined' && window.innerWidth >= 1024) return;
          if (touchStartX.current === null || touchStartY.current === null) return;
          const touch = event.changedTouches[0];
          const deltaX = touch.clientX - touchStartX.current;
          const deltaY = touch.clientY - touchStartY.current;
          touchStartX.current = null;
          touchStartY.current = null;
          if (Math.abs(deltaX) < 70 || Math.abs(deltaY) > 60) return;
          moveBySwipe(deltaX < 0 ? 'next' : 'prev');
        }, [moveBySwipe]);

        useEffect(() => {
          let cancelled = false;

          const loadArticle = async () => {
            if (!selectedVideo?.articleId || selectedVideo.markdown || articleCache[selectedVideo.articleId]) {
              return;
            }

            try {
              setArticleLoadingId(selectedVideo.articleId);
              const response = await fetch(`/api/info-viewer?id=${encodeURIComponent(selectedVideo.articleId)}`);
              if (!response.ok) {
                throw new Error(`article API ${response.status}`);
              }
              const payload = await response.json();
              if (!cancelled) {
                setArticleCache((current) => ({
                  ...current,
                  [selectedVideo.articleId]: payload.content || ''
                }));
              }
            } catch (error) {
              if (!cancelled) {
                setIndexError('記事本文の取得に失敗しました');
              }
            } finally {
              if (!cancelled) {
                setArticleLoadingId('');
              }
            }
          };

          loadArticle();
          return () => {
            cancelled = true;
          };
        }, [articleCache, selectedVideo]);

        const renderHeaderControls = () => (
          <div className="flex items-center gap-2">
            <button
              type="button"
              onClick={handleRefreshSheet}
              disabled={refreshingSheet}
              className={`w-6 h-6 rounded-full border border-white/35 bg-white/15 transition-colors inline-flex items-center justify-center ${
                refreshingSheet ? 'cursor-wait opacity-80' : 'hover:bg-white/25'
              }`}
              title="スプレッドシートを再読込"
            >
              <RefreshGlyph size={12} className={refreshingSheet ? 'animate-spin' : ''} />
            </button>
            <a
              href={selectedVideo.youtubeUrl || '#'}
              target="_blank"
              rel="noopener noreferrer"
              className="w-6 h-6 rounded-full border border-white/35 bg-white/15 hover:bg-white/25 transition-colors inline-flex items-center justify-center"
              title="動画を開く"
            >
              <VideoGlyph size={12} />
            </a>
          </div>
        );

        const renderDesktopVideoFilter = () => (
          <label className="hidden lg:flex items-center gap-2 text-[10px] font-semibold text-white/85">
            <span>フィルタ</span>
            <select
              value={desktopVideoFilter}
              onChange={(event) => setDesktopVideoFilter(event.target.value)}
              className="rounded-full border border-white/25 bg-white/90 px-3 py-1 text-[11px] text-slate-700 outline-none"
            >
              <option value="channel">チャンネル順</option>
              <option value="latest">新着順</option>
            </select>
          </label>
        );

        return (
          <div className="flex h-screen overflow-hidden">
            {mobileSidebarOpen && <div className="lg:hidden mobile-overlay" onClick={() => setMobileSidebarOpen(false)} />}

            <div className={`lg:hidden mobile-drawer ${mobileSidebarOpen ? 'open' : ''}`}>
              <PanelHeader title="Info-Viewer" badge={loadingIndex ? 'LOAD' : dataSource === 'api' ? 'LIVE' : dataSource === 'error' ? 'ERROR' : 'EMPTY'} bottomRight={renderHeaderControls()} />
              <div className="lg:hidden flex border-b border-slate-200 bg-white shrink-0">
                <button onClick={() => setMobilePanel('channels')} className={`flex-1 py-2.5 text-sm text-center transition-colors ${mobilePanel === 'channels' ? 'tab-active' : 'text-slate-400'}`}>チャンネル</button>
                <button onClick={() => setMobilePanel('videos')} className={`flex-1 py-2.5 text-sm text-center transition-colors ${mobilePanel === 'videos' ? 'tab-active' : 'text-slate-400'}`}>動画一覧</button>
                <button onClick={() => setMobilePanel('latest')} className={`flex-1 py-2.5 text-sm text-center transition-colors ${mobilePanel === 'latest' ? 'tab-active' : 'text-slate-400'}`}>新着</button>
              </div>
              <div className="flex-1 overflow-y-auto py-2">
                {mobilePanel === 'channels' ? (
                  <ChannelList channels={channels} selectedChannelId={selectedChannelId} onSelect={handleMobileSelectChannel} />
                ) : mobilePanel === 'videos' ? (
                  <VideoList
                    channel={selectedChannel}
                    selectedVideoId={selectedVideoId}
                    selectedVideoIds={selectedVideoIds}
                    onSelect={(videoId, event) => {
                      const video = selectedChannel.videos.find((item) => item.id === videoId);
                      if (!video) return;
                      handleVideoClick(video, event, 'channel');
                      setMobileSidebarOpen(false);
                    }}
                    onPrioritize={handlePrioritizeVideo}
                    priorityLoadingId={priorityLoadingId}
                    onContextMenu={handleVideoContextMenu}
                  />
                ) : (
                  <RecentList
                    videos={latestVideos}
                    selectedVideoId={selectedVideoId}
                    selectedVideoIds={selectedVideoIds}
                    onSelect={(channelId, videoId, event) => {
                      const video = latestVideos.find((item) => item.id === videoId && item.channelId === channelId);
                      if (!video) return;
                      handleVideoClick(video, event, 'latest');
                      setMobileSidebarOpen(false);
                    }}
                    onPrioritize={handlePrioritizeVideo}
                    priorityLoadingId={priorityLoadingId}
                    onContextMenu={handleVideoContextMenu}
                  />
                )}
              </div>
            </div>

            <div
              className={`hidden lg:flex h-screen bg-white flex-col flex-shrink-0 overflow-hidden transition-[width,opacity,border-color] duration-300 ease-out ${
                channelCollapsed ? 'opacity-0 pointer-events-none border-r border-transparent' : 'opacity-100 border-r border-slate-200'
              }`}
              style={{ width: channelCollapsed ? 0 : channelWidth }}
            >
              <PanelHeader title="Info-Viewer" badge={`${channels.length} 件`} bottomRight={renderHeaderControls()} />
              <div className="flex-1 overflow-y-auto py-2">
                <ChannelList channels={channels} selectedChannelId={selectedChannelId} onSelect={handleSelectChannel} />
              </div>
            </div>

            <BoundaryHandle
              handleClassName="sidebar-resize-handle"
              collapsed={channelCollapsed}
              onToggle={() => setChannelCollapsed((value) => !value)}
              onResizeStart={onChannelResizeStart}
            />

            <div
              className={`hidden lg:flex h-screen bg-white flex-col flex-shrink-0 overflow-hidden transition-[width,opacity,border-color] duration-300 ease-out ${
                videoCollapsed ? 'opacity-0 pointer-events-none border-r border-transparent' : 'opacity-100 border-r border-slate-200'
              }`}
              style={{ width: videoCollapsed ? 0 : videoWidth }}
            >
              <PanelHeader
                title="動画一覧"
                badge={`${desktopVideos.length} 本`}
                bottomRight={renderDesktopVideoFilter()}
              />
              <div className="flex-1 overflow-y-auto py-2">
                {desktopVideoFilter === 'latest' ? (
                  <RecentList
                    videos={desktopVideos}
                    selectedVideoId={selectedVideoId}
                    selectedVideoIds={selectedVideoIds}
                    onSelect={(channelId, videoId, event) => {
                      const video = desktopVideos.find((item) => item.id === videoId && item.channelId === channelId);
                      if (!video) return;
                      handleVideoClick(video, event, 'latest');
                    }}
                    onPrioritize={handlePrioritizeVideo}
                    priorityLoadingId={priorityLoadingId}
                    onContextMenu={handleVideoContextMenu}
                  />
                ) : (
                  <VideoList
                    channel={selectedChannel}
                    selectedVideoId={selectedVideoId}
                    selectedVideoIds={selectedVideoIds}
                    onSelect={(videoId, event) => {
                      const video = selectedChannel.videos.find((item) => item.id === videoId);
                      if (!video) return;
                      handleVideoClick(video, event, 'channel');
                    }}
                    onPrioritize={handlePrioritizeVideo}
                    priorityLoadingId={priorityLoadingId}
                    onContextMenu={handleVideoContextMenu}
                  />
                )}
              </div>
            </div>

            <BoundaryHandle
              handleClassName="resize-handle"
              collapsed={videoCollapsed}
              onToggle={() => setVideoCollapsed((value) => !value)}
              onResizeStart={onVideoResizeStart}
            />

            <main className="flex-1 flex flex-col min-w-0 h-screen">
              <header className="bg-white border-b border-slate-200 px-4 py-2.5 flex items-center gap-3 shrink-0 min-h-[52px]">
                <button
                  className="lg:hidden p-1.5 text-slate-500 hover:bg-slate-100 rounded-lg transition-colors flex-shrink-0"
                  onClick={() => setMobileSidebarOpen(true)}
                  title="メニューを開く"
                >
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <path d="M3 12h18M3 6h18M3 18h18" />
                  </svg>
                </button>

                <div className="flex-1 min-w-0">
                  <h2 className="text-sm font-bold text-slate-800 truncate">{selectedVideo.title}</h2>
                  <p className="text-xs text-slate-400">
                    {selectedChannel.name} ・ {formatVideoTimestamp(resolveVideoUpdatedAt(selectedVideo))}
                  </p>
                </div>

                <div className="flex items-center gap-2 flex-shrink-0">
                  <a
                    href={SHEET_URL}
                    target="_blank"
                    rel="noopener noreferrer"
                    className="flex items-center gap-1.5 font-semibold rounded-lg px-3 py-2 text-xs border border-[#7C4DFF] text-[#7C4DFF] hover:bg-purple-50 transition-all"
                    title="シートを開く"
                  >
                    シート
                  </a>

                  <a
                    href="/index.html"
                    className="hidden sm:flex items-center gap-1.5 font-semibold rounded-lg px-3 py-2 text-xs border border-slate-200 text-slate-500 hover:bg-slate-50 transition-all"
                    title="記事エディタへ戻る"
                  >
                    エディタへ戻る
                  </a>
                </div>
              </header>

              <div className="px-4 py-1.5 bg-slate-50 border-b border-slate-100 text-xs text-slate-400 font-medium flex items-center gap-2 shrink-0">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                <span>プレビュー</span>
                <span className="hidden ml-auto text-[11px] text-slate-400">
                  {loadingIndex ? '読み込み中' : dataSource === 'api' ? '実データ' : 'ダミー'}
                </span>
                <span className="ml-auto text-[11px] text-slate-400">
                  {loadingIndex ? '読み込み中' : dataSource === 'api' ? '実データ' : dataSource === 'error' ? 'エラー' : '未生成'}
                </span>
                <a
                  href={selectedChannel.channelUrl}
                  target="_blank"
                  rel="noopener noreferrer"
                  className="w-5 h-5 rounded-full border border-slate-200 text-[#7C4DFF] hover:bg-purple-50 transition-colors inline-flex items-center justify-center flex-shrink-0"
                  title="チャンネルを開く"
                >
                  <VideoGlyph size={10} />
                </a>
              </div>

              <div
                className="flex-1 min-h-0 mobile-swipe-surface"
                onTouchStart={handlePreviewTouchStart}
                onTouchEnd={handlePreviewTouchEnd}
              >
                {selectedMarkdown ? (
                  <div className="h-full overflow-y-auto p-6 markdown-preview animate-fade-in bg-white" dangerouslySetInnerHTML={{ __html: renderedHTML }} />
                ) : articleLoadingId && articleLoadingId === selectedVideo.articleId ? (
                  <div className="h-full flex items-center justify-center bg-white animate-fade-in">
                    <div className="text-center px-8">
                      <h3 className="text-lg font-bold text-slate-800 mb-2">記事を読み込み中です</h3>
                      <p className="text-slate-400 text-sm max-w-md leading-relaxed">
                        {dataSource === 'api' ? 'OneDrive 上の記事本文を取得しています。' : 'manifest の更新結果を待っています。'}
                      </p>
                    </div>
                  </div>
                ) : (
                  <div className="h-full flex items-center justify-center bg-white animate-fade-in">
                    <div className="text-center px-8">
                      <div className="w-20 h-20 mx-auto mb-5 rounded-2xl bg-gradient-to-br from-[#7C4DFF] to-[#651FFF] flex items-center justify-center shadow-lg shadow-purple-200">
                        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="1.5">
                          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
                          <path d="M14 2v6h6" />
                          <path d="M9 15h6" />
                        </svg>
                      </div>
                      <h3 className="text-lg font-bold text-slate-800 mb-2">記事はまだ生成されていません</h3>
                      <p className="text-slate-400 text-sm max-w-md leading-relaxed">
                        {dataSource === 'api'
                          ? 'この動画はシート上の対象ですが、まだ記事ファイルが生成されていません。次回の自動取得で再試行されます。'
                          : dataSource === 'error'
                            ? 'manifest の取得に失敗しています。更新ボタンで再読込するか、Actions の状態をご確認ください。'
                            : 'manifest 生成待ちです。更新ボタンからスプレッドシート再読込を実行できます。'}
                      </p>
                      {selectedVideo.lastFailureMessage ? (
                        <div className="mt-4 max-w-xl rounded-xl border border-amber-200 bg-amber-50 px-4 py-3 text-left">
                          <p className="text-xs font-bold text-amber-700">
                            最終失敗: {selectedVideo.lastFailureStage || '未分類'}
                          </p>
                          <p className="mt-1 text-xs leading-relaxed text-amber-900">
                            {selectedVideo.lastFailureMessage}
                          </p>
                          <p className="mt-1 text-[11px] text-amber-700">
                            {formatDateTime(selectedVideo.lastFailureAt)}
                          </p>
                        </div>
                      ) : null}
                      {indexError ? <p className="mt-3 text-[11px] text-slate-400">{indexError}</p> : null}
                    </div>
                  </div>
                )}
              </div>
            </main>

            {videoContextMenu.visible && videoContextMenu.video ? (
              <div
                style={{
                  position: 'fixed',
                  left: videoContextMenu.x,
                  top: videoContextMenu.y,
                  width: '188px',
                  background: 'white',
                  border: '1px solid #e2e8f0',
                  borderRadius: '12px',
                  boxShadow: '0 16px 40px rgba(15, 23, 42, 0.18)',
                  zIndex: 9999,
                  padding: '6px',
                }}
                onClick={(event) => event.stopPropagation()}
              >
                <button
                  type="button"
                  onClick={() => {
                    handleToggleVideoSelection(videoContextMenu.video.id);
                    setVideoContextMenu((current) => ({ ...current, visible: false }));
                  }}
                  onMouseEnter={(event) => { event.currentTarget.style.background = '#f5f3ff'; }}
                  onMouseLeave={(event) => { event.currentTarget.style.background = 'transparent'; }}
                  style={{ display: 'flex', alignItems: 'center', gap: '8px', width: '100%', padding: '9px 12px', border: 'none', background: 'transparent', borderRadius: '9px', cursor: 'pointer', color: '#334155', textAlign: 'left', fontSize: '13px' }}
                >
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 11l3 3L22 4" /><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" /></svg>
                  {selectedVideoIds.has(videoContextMenu.video.id) ? '選択解除' : '選択'}
                </button>
                <button
                  type="button"
                  onClick={() => handleDeleteVideo(videoContextMenu.video)}
                  disabled={!videoContextMenu.video.articleId}
                  onMouseEnter={(event) => { if (!event.currentTarget.disabled) event.currentTarget.style.background = '#fff1f2'; }}
                  onMouseLeave={(event) => { event.currentTarget.style.background = 'transparent'; }}
                  style={{ display: 'flex', alignItems: 'center', gap: '8px', width: '100%', padding: '9px 12px', border: 'none', background: 'transparent', borderRadius: '9px', cursor: videoContextMenu.video.articleId ? 'pointer' : 'not-allowed', color: videoContextMenu.video.articleId ? '#dc2626' : '#cbd5e1', textAlign: 'left', fontSize: '13px' }}
                >
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18" /><path d="M8 6V4h8v2" /><path d="M19 6l-1 14H6L5 6" /></svg>
                  削除
                </button>
                <button
                  type="button"
                  onClick={() => handleOpenInOneDrive(videoContextMenu.video)}
                  disabled={!videoContextMenu.video.articleWebUrl}
                  onMouseEnter={(event) => { if (!event.currentTarget.disabled) event.currentTarget.style.background = '#f8fafc'; }}
                  onMouseLeave={(event) => { event.currentTarget.style.background = 'transparent'; }}
                  style={{ display: 'flex', alignItems: 'center', gap: '8px', width: '100%', padding: '9px 12px', border: 'none', background: 'transparent', borderRadius: '9px', cursor: videoContextMenu.video.articleWebUrl ? 'pointer' : 'not-allowed', color: videoContextMenu.video.articleWebUrl ? '#334155' : '#cbd5e1', textAlign: 'left', fontSize: '13px' }}
                >
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" /><polyline points="15 3 21 3 21 9" /><line x1="10" y1="14" x2="21" y2="3" /></svg>
                  OneDriveで開く
                </button>
              </div>
            ) : null}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    })();
  </script>
</body>

</html>
