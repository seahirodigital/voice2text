<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibe Blog Engine</title>
  <meta name="description" content="YouTube動画からAIで自動生成されたブログ記事を閲覧・編集・保存できるMarkdownエディタ" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel (JSX transpilation) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Marked.js (Markdown → HTML) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      background: #f8fafc;
      color: #334155;
    }

    /* ── アニメーション ── */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .5
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0
      }

      100% {
        background-position: 200% 0
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .animate-fade-in {
      animation: fadeIn 0.35s ease-out;
    }

    .animate-fade-in-up {
      animation: fadeInUp 0.5s ease-out;
    }

    .animate-spin {
      animation: spin 0.8s linear infinite;
    }

    .skeleton {
      background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 0.5rem;
    }

    /* ── スクロールバー ── */
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    /* ── リサイズハンドル ── */
    .resize-handle {
      width: 5px;
      background: transparent;
      cursor: col-resize;
      flex-shrink: 0;
      position: relative;
      transition: background 0.15s;
      z-index: 10;
    }

    .resize-handle:hover,
    .resize-handle.dragging {
      background: #7C4DFF;
    }

    .resize-handle::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 3px;
      height: 40px;
      border-radius: 9999px;
      background: #cbd5e1;
      transition: background 0.15s;
    }

    .resize-handle:hover::after,
    .resize-handle.dragging::after {
      background: #7C4DFF;
    }

    /* サイドバー境界ハンドル */
    .sidebar-resize-handle {
      width: 4px;
      background: transparent;
      cursor: col-resize;
      flex-shrink: 0;
      transition: background 0.15s;
      z-index: 10;
    }

    .sidebar-resize-handle:hover,
    .sidebar-resize-handle.dragging {
      background: #7C4DFF22;
    }

    /* ── エディタ ── */
    .editor-textarea {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
      line-height: 1.75;
      resize: none;
      tab-size: 2;
    }

    /* ── Markdown プレビュー ── */
    .markdown-preview h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1e293b;
      margin: 1.5rem 0 0.75rem;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 0.5rem;
    }

    .markdown-preview h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1e293b;
      margin: 1.25rem 0 0.5rem;
    }

    .markdown-preview h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #334155;
      margin: 1rem 0 0.4rem;
    }

    .markdown-preview p {
      margin: 0.7rem 0;
      line-height: 1.85;
    }

    .markdown-preview ul {
      margin: 0.7rem 0;
      padding-left: 0;
      list-style-type: none;
    }

    .markdown-preview ol {
      margin: 0.7rem 0;
      padding-left: 1.5rem;
    }

    .markdown-preview ul>li {
      margin: 0.35rem 0;
      line-height: 1.7;
      padding-left: 1.2rem;
      position: relative;
    }

    .markdown-preview ul>li::before {
      content: '・';
      position: absolute;
      left: 0;
      color: #475569;
    }

    .markdown-preview ol li {
      margin: 0.35rem 0;
      line-height: 1.7;
    }

    .markdown-preview blockquote {
      border-left: 4px solid #7C4DFF;
      background: #f5f3ff;
      padding: 0.75rem 1rem;
      margin: 0.75rem 0;
      border-radius: 0 0.5rem 0.5rem 0;
      color: #4c1d95;
    }

    .markdown-preview code {
      background: #f1f5f9;
      padding: 0.1rem 0.35rem;
      border-radius: 0.25rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: #7C4DFF;
    }

    .markdown-preview pre {
      background: #1e293b;
      color: #e2e8f0;
      padding: 1rem;
      border-radius: 0.75rem;
      overflow-x: auto;
      margin: 1rem 0;
    }

    .markdown-preview pre code {
      background: none;
      color: inherit;
      padding: 0;
    }

    .markdown-preview table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
    }

    .markdown-preview th {
      background: #f8fafc;
      font-weight: 600;
      text-align: left;
      padding: 0.65rem 0.75rem;
      border: 1px solid #e2e8f0;
    }

    .markdown-preview td {
      padding: 0.65rem 0.75rem;
      border: 1px solid #e2e8f0;
    }

    .markdown-preview a {
      color: #7C4DFF;
      text-decoration: underline;
    }

    .markdown-preview img {
      max-width: 100%;
      border-radius: 0.5rem;
      margin: 0.5rem 0;
    }

    .markdown-preview hr {
      border: none;
      border-top: 2px solid #e2e8f0;
      margin: 1.5rem 0;
    }

    /* ── トースト ── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 0.875rem 1.25rem;
      border-radius: 0.75rem;
      color: white;
      font-weight: 600;
      z-index: 9999;
      animation: fadeInUp 0.3s ease-out;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .toast-success {
      background: linear-gradient(135deg, #10B981, #059669);
    }

    .toast-error {
      background: linear-gradient(135deg, #F43F5E, #E11D48);
    }

    .toast-info {
      background: linear-gradient(135deg, #7C4DFF, #651FFF);
    }

    /* ── サイドバー ── */
    .sidebar-collapsed {
      width: 0 !important;
      overflow: hidden;
    }

    /* ── フォルダツリー ── */
    .folder-item {
      transition: background 0.15s;
    }

    .folder-item:hover {
      background: #f8fafc;
    }

    .article-item {
      transition: all 0.15s;
    }

    .article-item:hover {
      background: #f1f5f9;
    }

    .article-item.active {
      background: #7C4DFF;
      color: white;
    }

    .article-item.active .article-date {
      color: #c4b5fd;
    }

    /* タイトル編集インプット */
    .title-input {
      background: transparent;
      border: none;
      outline: none;
      font-size: 0.9rem;
      font-weight: 700;
      color: #1e293b;
      width: 100%;
    }

    .title-input:focus {
      background: #f8fafc;
      border-radius: 0.25rem;
      padding: 0 0.25rem;
    }

    /* タブ（モバイル） */
    .tab-active {
      border-bottom: 3px solid #7C4DFF;
      color: #7C4DFF;
      font-weight: 600;
    }

    /* サイドバートグルボタン */
    .sidebar-toggle {
      position: absolute;
      top: 50%;
      right: -14px;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border-radius: 9999px;
      background: white;
      border: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 20;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      transition: all 0.15s;
    }

    .sidebar-toggle:hover {
      background: #7C4DFF;
      border-color: #7C4DFF;
      color: white;
    }

    .sidebar-toggle svg {
      transition: transform 0.2s;
    }

    /* ── モバイルドロワー ── */
    .mobile-drawer {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 280px;
      z-index: 50;
      background: white;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.2);
      transform: translateX(-100%);
      transition: transform 0.25s ease;
    }

    .mobile-drawer.open {
      transform: translateX(0);
    }

    .mobile-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 40;
    }

    /* ── アフィリンクモーダル ── */
    .aff-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease-out;
    }

    .aff-modal {
      background: white;
      border-radius: 1rem;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
      animation: fadeInUp 0.25s ease-out;
      overflow: hidden;
      min-width: 400px;
      min-height: 300px;
    }

    .aff-tab {
      padding: 0.625rem 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      border: none;
      border-bottom: 2px solid transparent;
      background: none;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .aff-tab:hover {
      color: #7C4DFF;
    }

    .aff-tab.active {
      color: #7C4DFF;
      border-bottom-color: #7C4DFF;
    }

    .aff-ta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      line-height: 1.7;
      resize: none;
      flex: 1;
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #e2e8f0;
      border-radius: 0.5rem;
      background: #f8fafc;
      color: #334155;
      outline: none;
      transition: border-color 0.15s;
    }

    .aff-ta:focus {
      border-color: #7C4DFF;
      box-shadow: 0 0 0 3px rgba(124, 77, 255, 0.1);
    }

    /* モーダルリサイズハンドル */
    .aff-resize-handle {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 22px;
      height: 22px;
      cursor: se-resize;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      padding: 4px;
      color: #cbd5e1;
      z-index: 10;
    }

    .aff-resize-handle:hover {
      color: #7C4DFF;
    }

    /* OGPカード（Amazon風：テキスト左・画像右） */
    .ogp-card {
      border: 1px solid #e2e8f0;
      border-radius: 0.75rem;
      overflow: hidden;
      display: flex;
      text-decoration: none !important;
      color: inherit !important;
      margin: 0.75rem 0;
      background: #fff;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.08);
      transition: box-shadow 0.15s;
      min-height: 100px;
      max-height: 160px;
    }

    .ogp-card:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.14);
    }

    .ogp-card-body {
      padding: 0.875rem 1rem;
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      min-width: 0;
    }

    .ogp-card-domain {
      font-size: 0.68rem;
      color: #94a3b8;
    }

    .ogp-card-title {
      font-weight: 700;
      font-size: 0.88rem;
      line-height: 1.4;
      color: #1e293b;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .ogp-card-desc {
      font-size: 0.72rem;
      color: #64748b;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      margin-top: auto;
    }

    .ogp-card-image {
      width: 140px;
      min-width: 140px;
      max-width: 140px;
      object-fit: contain;
      padding: 0.5rem;
      background: #f8fafc;
      flex-shrink: 0;
    }

    /* ── モバイルスワイプアクション（タッチデバイス専用） ── */
    .swipe-row {
      position: relative;
      overflow: hidden;
      border-radius: 0.375rem;
    }

    /* swipe-inner は常に幅100%でrevealボタンを隠す */
    .swipe-inner {
      transition: transform 0.2s ease;
      will-change: transform;
      width: 100%;
    }

    .swipe-inner.swiped {
      transform: translateX(-84px);
    }

    /* デスクトップ（ホバー可能デバイス）ではスワイプボタン完全非表示 */
    @media (hover: hover) and (pointer: fine) {
      .swipe-actions-reveal {
        display: none !important;
      }
    }

    /* スワイプされていない状態では非表示、swiped-activeクラスがついた場合のみ表示 */
    .swipe-actions-reveal {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      display: none;
      width: 84px;
      overflow: hidden;
      border-radius: 0 0.375rem 0.375rem 0;
    }

    .swipe-row.swiped-active .swipe-actions-reveal {
      display: flex;
    }

    .swipe-action-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      font-size: 10px;
      font-weight: 600;
      gap: 3px;
      padding: 0;
      transition: opacity 0.1s;
    }

    .swipe-action-btn:active {
      opacity: 0.75;
    }

    /* ── 長押しドラッグ（タッチ） ── */
    .touch-drag-ghost {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      background: white;
      border-radius: 8px;
      padding: 7px 14px;
      box-shadow: 0 8px 28px rgba(124, 77, 255, 0.35);
      border: 2px solid #7C4DFF;
      font-size: 12px;
      font-weight: 600;
      color: #7C4DFF;
      max-width: 220px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transform: translate(-50%, calc(-100% - 14px));
    }

    .touch-dragging-item {
      opacity: 0.35;
    }

    .touch-drag-folder-target {
      background: rgba(124, 77, 255, 0.12) !important;
      outline: 2px dashed #7C4DFF !important;
      outline-offset: -2px;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useLayoutEffect, useRef, useCallback, useMemo } = React;

    // Marked.js: リンクを別タブで開く（v5 API：オブジェクト引数）
    marked.use({
      renderer: {
        link({ href, title, text }) {
          const safeHref = href || '';
          const safeText = text || safeHref;
          return `<a href="${safeHref}"${title ? ` title="${title}"` : ''} target="_blank" rel="noopener noreferrer">${safeText}</a>`;
        }
      }
    });

    const INFO_VIEWER_LINK = { id: 'info-viewer', title: 'info_viewer', url: 'https://blog-vercel-dun.vercel.app/info_viewer/' };

    function isInfoViewerLink(link) {
      if (!link || typeof link !== 'object') return false;
      const linkId = String(link.id || '').trim();
      const linkUrl = String(link.url || '').trim().replace(/\/+$/, '');
      return linkId === INFO_VIEWER_LINK.id
        || linkUrl === '/info_viewer/index.html'
        || linkUrl === '/info_viewer'
        || linkUrl === 'https://blog-vercel-dun.vercel.app/info_viewer';
    }

    function ensureInfoViewerLink(links) {
      const normalizedLinks = Array.isArray(links) ? links.filter((link) => link && typeof link === 'object') : [];
      const result = [{ ...INFO_VIEWER_LINK }];

      normalizedLinks.forEach((link) => {
        if (isInfoViewerLink(link)) return;
        result.push(link);
      });
      return result;
    }

    // === API ヘルパー ===
    const API_BASE = '/api';

    async function fetchArticles(externalUrls = [], options = {}) {
      const params = new URLSearchParams();
      if (externalUrls && externalUrls.length > 0) params.set('externalUrls', JSON.stringify(externalUrls));
      if (options.mode) params.set('mode', options.mode);
      if (options.folderPath) params.set('folderPath', options.folderPath);
      if (options.folderId) params.set('folderId', options.folderId);
      if (options.h1Limit !== undefined) params.set('h1Limit', String(options.h1Limit));
      const qs = params.toString() ? `?${params.toString()}` : '';
      const res = await fetch(`${API_BASE}/articles${qs}`);
      if (!res.ok) throw new Error('記事一覧の取得に失敗しました');
      const data = await res.json();
      if (options.raw) return data;
      return data.articles || [];
    }

    async function fetchArticleContent(id) {
      const res = await fetch(`${API_BASE}/articles?id=${id}`);
      if (!res.ok) throw new Error('記事の読み込みに失敗しました');
      const data = await res.json();
      return data.content || '';
    }

    async function saveArticle(filename, content, fileId = null) {
      const res = await fetch(`${API_BASE}/articles`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename, content, fileId }),
      });
      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error || '保存に失敗しました');
      }
      return await res.json();
    }

    async function renameArticleApi(fileId, newName) {
      const res = await fetch(`${API_BASE}/articles`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fileId, newName }),
      });
      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error || 'リネームに失敗しました');
      }
      return await res.json();
    }

    async function deleteArticleApi(fileId) {
      const res = await fetch(`${API_BASE}/articles`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fileId }),
      });
      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error || '削除に失敗しました');
      }
      return await res.json();
    }

    async function duplicateArticleApi(fileId, newName, folderPath) {
      const res = await fetch(`${API_BASE}/articles`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fileId, newName, folderPath }),
      });
      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error || '複製に失敗しました');
      }
      return await res.json();
    }

    async function moveArticleApi(fileId, destFolderPath) {
      const res = await fetch(`${API_BASE}/articles`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fileId, action: 'move', destFolderPath }),
      });
      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error || '移動に失敗しました');
      }
      return await res.json();
    }

    async function triggerPipeline() {
      const res = await fetch(`${API_BASE}/trigger`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode: 'batch' }),
      });
      if (!res.ok) throw new Error('パイプラインの起動に失敗しました');
      return await res.json();
    }

    async function triggerNoteDraft(fileIds) {
      const ids = Array.isArray(fileIds) ? fileIds : [fileIds];
      const res = await fetch(`${API_BASE}/note-draft`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fileIds: ids, noteTarget: 'blog_main' }),
      });
      if (!res.ok) throw new Error('note下書き投稿の起動に失敗しました');
      return await res.json();
    }

    async function fetchNoteDraftUrl(fileId) {
      try {
        const res = await fetch(`${API_BASE}/note-draft?fileId=${encodeURIComponent(fileId)}`);
        if (!res.ok) return null;
        const data = await res.json();
        return data.url || null;
      } catch { return null; }
    }

    // === アフィリエイトリンク API（OneDrive Graph API 経由で同期） ===
    async function fetchAffiliateMemos() {
      const res = await fetch(`${API_BASE}/affiliate-links`);
      if (!res.ok) throw new Error('アフィリンクの取得に失敗しました');
      const data = await res.json();
      return data.memos || { memo1: '' };
    }

    async function saveAffiliateMemos(memos) {
      const res = await fetch(`${API_BASE}/affiliate-links`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ memos }),
      });
      if (!res.ok) throw new Error('アフィリンクの保存に失敗しました');
      return await res.json();
    }

    // === フォルダ階層構築ユーティリティ ===
    // APIから返される article.path（OneDriveの実際のフォルダ階層）を使って
    // 多段階ネストツリーを構築する
    // 戻り値: { _articles: [], subfolders: { "フォルダ名": { _articles: [], subfolders: {} } } }
    function createFolderNode(path = '') {
      return { _articles: [], subfolders: {}, _meta: { path, loaded: true, childCount: 0 } };
    }

    function ensureFolderNode(root, folderPath) {
      const parts = (folderPath || '').trim().split('/').filter(Boolean);
      let node = root;
      let acc = '';
      for (const part of parts) {
        acc = acc ? `${acc}/${part}` : part;
        if (!node.subfolders[part]) node.subfolders[part] = createFolderNode(acc);
        node = node.subfolders[part];
      }
      return node;
    }

    function buildFolderTree(articles, folderMeta = {}) {
      const root = createFolderNode('');
      Object.values(folderMeta || {}).forEach((meta) => {
        if (!meta || !meta.path) return;
        const node = ensureFolderNode(root, meta.path);
        node._meta = { ...node._meta, ...meta };
      });

      for (const article of articles) {
        const node = ensureFolderNode(root, article.path || '');
        node._articles.push(article);
      }
      return root;
    }

    // ノード以下の全記事数を再帰的に合計
    function countArticles(node) {
      const knownCount = node._articles.length +
        Object.values(node.subfolders).reduce((s, c) => s + countArticles(c), 0);
      const childCount = node._meta && Number.isFinite(node._meta.childCount) ? node._meta.childCount : 0;
      return node._meta && node._meta.loaded === false ? Math.max(knownCount, childCount) : knownCount;
    }

    // === Toast コンポーネント ===
    function Toast({ message, type, onClose }) {
      useEffect(() => {
        const t = setTimeout(onClose, 3500);
        return () => clearTimeout(t);
      }, [onClose]);

      const icons = {
        success: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M20 6L9 17l-5-5" /></svg>,
        error: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 6L6 18M6 6l12 12" /></svg>,
        info: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10" /><path d="M12 8v4m0 4h.01" /></svg>,
      };

      return (
        <div className={`toast toast-${type}`}>
          {icons[type]}
          {message}
        </div>
      );
    }

    // === リサイズフック ===
    function useResizable(initialWidth, minWidth, maxWidth) {
      const [width, setWidth] = useState(initialWidth);
      const dragging = useRef(false);
      const startX = useRef(0);
      const startW = useRef(0);

      const onMouseDown = useCallback((e) => {
        dragging.current = true;
        startX.current = e.clientX;
        startW.current = width;
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
      }, [width]);

      useEffect(() => {
        const onMove = (e) => {
          if (!dragging.current) return;
          const delta = e.clientX - startX.current;
          const newW = Math.min(maxWidth, Math.max(minWidth, startW.current + delta));
          setWidth(newW);
        };
        const onUp = () => {
          if (!dragging.current) return;
          dragging.current = false;
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
        return () => {
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
        };
      }, [minWidth, maxWidth]);

      return [width, onMouseDown];
    }

    // === フォルダツリー コンポーネント ===
    function FolderTree({ articles, selectedId, onSelect, loading, onDeleteArticle, onDuplicateArticle, onMoveArticle, hiddenFolders, onHideFolder, selectMode, selectedIds, onToggleSelect, onEnterSelectMode, onMultiSelect, onRangeSelect, multiSelectedIds, articleH1Cache, folderMeta = {}, folderLoading = {}, onLoadFolder }) {
      const [openFolders, setOpenFolders] = useState({});
      const [ctxMenu, setCtxMenu] = useState({ visible: false, x: 0, y: 0, article: null });
      const [folderCtxMenu, setFolderCtxMenu] = useState({ visible: false, x: 0, y: 0, path: '' });
      const [confirmDelete, setConfirmDelete] = useState(null);
      const [dragOver, setDragOver] = useState(null); // ドロップ先フォルダパス（マウス）
      const dragArticleRef = useRef(null); // ドラッグ中の記事
      const lastClickedIdRef = useRef(null); // Shift範囲選択の起点
      // ── モバイルタッチ用 state/ref ──
      const [swipedId, setSwipedId] = useState(null);         // 左スワイプ中の記事ID
      const [dragGhostInfo, setDragGhostInfo] = useState(null); // 長押しゴースト { x, y, name }
      const [touchDragOver, _setTouchDragOver] = useState(null); // タッチドラッグ中のフォルダ
      const [visibleArticleLimit, setVisibleArticleLimit] = useState(3);
      const touchDragOverRef = useRef(null);
      const setTouchDragOver = (v) => { touchDragOverRef.current = v; _setTouchDragOver(v); };
      const touchRef = useRef({ startX: 0, startY: 0, article: null, mode: null, timer: null });
      const sbTouchContainerRef = useRef(null); // スクロール防止用コンテナ ref

      // 長押しドラッグ中は touchmove のデフォルト（スクロール）を防ぐ（非パッシブ登録）
      useEffect(() => {
        const el = sbTouchContainerRef.current;
        if (!el) return;
        const prevent = (e) => { if (touchRef.current.mode === 'drag') e.preventDefault(); };
        el.addEventListener('touchmove', prevent, { passive: false });
        return () => el.removeEventListener('touchmove', prevent);
      }, []);

      const rootNode = useMemo(() => buildFolderTree(articles, folderMeta), [articles, folderMeta]);

      useEffect(() => {
        if (visibleArticleLimit >= articles.length) return;
        let cancelled = false;
        let idleId = null;
        let timerId = null;
        const run = () => {
          if (cancelled) return;
          setVisibleArticleLimit(limit => Math.min(limit + 20, articles.length));
        };
        if (window.requestIdleCallback) {
          idleId = window.requestIdleCallback(run, { timeout: 300 });
        } else {
          timerId = setTimeout(run, 120);
        }
        return () => {
          cancelled = true;
          if (idleId !== null && window.cancelIdleCallback) window.cancelIdleCallback(idleId);
          if (timerId !== null) clearTimeout(timerId);
        };
      }, [articles.length, visibleArticleLimit]);

      // 初期状態: デフォルトは閉じた状態にする
      useEffect(() => {
        // 以前は第1階層を展開していたが、ユーザー要望によりデフォルトは閉じた状態に
        // const initOpen = {};
        // Object.keys(rootNode.subfolders).forEach(k => { initOpen[k] = true; });
        // setOpenFolders(initOpen);
      }, []);

      // コンテキストメニュー外クリックで閉じる
      useEffect(() => {
        if (!ctxMenu.visible && !folderCtxMenu.visible) return;
        const close = () => {
          setCtxMenu(m => ({ ...m, visible: false }));
          setFolderCtxMenu(m => ({ ...m, visible: false }));
        };
        window.addEventListener('click', close);
        window.addEventListener('contextmenu', close);
        return () => { window.removeEventListener('click', close); window.removeEventListener('contextmenu', close); };
      }, [ctxMenu.visible, folderCtxMenu.visible]);

      const toggleFolder = (path, meta) => {
        const willOpen = !openFolders[path];
        setOpenFolders(prev => ({ ...prev, [path]: !prev[path] }));
        if (willOpen && meta && meta.loaded === false && !folderLoading[path] && onLoadFolder) {
          onLoadFolder(path, meta);
        }
      };

      // ── モバイルタッチ: 長押しドラッグ & 左スワイプ ──
      const LONG_PRESS_MS = 500;
      const SWIPE_THRESHOLD = 55;

      const onArticleTouchStart = (e, article) => {
        const t = e.touches[0];
        touchRef.current = { startX: t.clientX, startY: t.clientY, article, mode: null, timer: null };
        touchRef.current.timer = setTimeout(() => {
          touchRef.current.mode = 'drag';
          dragArticleRef.current = (multiSelectedIds && multiSelectedIds.size > 0 && multiSelectedIds.has(article.id))
            ? articles.filter(a => multiSelectedIds.has(a.id))
            : article;
          if (navigator.vibrate) navigator.vibrate(40);
          setDragGhostInfo({ x: t.clientX, y: t.clientY, name: article.name.replace(/^\d{8}_\d{4}_/, '').replace('.md', '') });
          setSwipedId(null);
        }, LONG_PRESS_MS);
      };

      const onArticleTouchMove = (e) => {
        const tr = touchRef.current;
        if (!tr.article) return;
        const t = e.touches[0];
        const dx = t.clientX - tr.startX;
        const dy = t.clientY - tr.startY;

        if (tr.mode === 'drag') {
          // preventDefault は非パッシブリスナー側で処理
          setDragGhostInfo(prev => prev ? { ...prev, x: t.clientX, y: t.clientY } : null);
          const el = document.elementFromPoint(t.clientX, t.clientY);
          const folderEl = el && el.closest('[data-folder-path]');
          setTouchDragOver(folderEl ? folderEl.dataset.folderPath : null);
          return;
        }
        if (tr.mode === null) {
          // 縦スクロール優先: 長押しキャンセル
          if (Math.abs(dy) > 12 && Math.abs(dy) > Math.abs(dx)) {
            clearTimeout(tr.timer); tr.mode = 'scroll';
          } else if (dx < -12) {
            // 左スワイプ確定: 長押しキャンセル
            clearTimeout(tr.timer); tr.mode = 'swipe';
          }
        }
      };

      const onArticleTouchEnd = (e) => {
        const tr = touchRef.current;
        if (!tr.article) return;
        clearTimeout(tr.timer);
        const t = e.changedTouches[0];
        const dx = t.clientX - tr.startX;

        if (tr.mode === 'drag') {
          setDragGhostInfo(null);
          const over = touchDragOverRef.current;
          setTouchDragOver(null);
          const dragged = dragArticleRef.current;
          dragArticleRef.current = null;
          if (dragged !== null && over !== null) {
            const targets = Array.isArray(dragged) ? dragged : [dragged];
            const toMove = targets.filter(a => a.path !== over);
            if (toMove.length > 0) onMoveArticle && onMoveArticle(toMove, over);
          }
        } else if (dx < -SWIPE_THRESHOLD) {
          setSwipedId(tr.article.id);
        } else if (dx > 20 && swipedId === tr.article.id) {
          setSwipedId(null);
        }
        touchRef.current.article = null;
        touchRef.current.mode = null;
      };

      const handleContextMenu = (e, article) => {
        e.preventDefault();
        e.stopPropagation();
        const MENU_W = 190, MENU_H = 170;
        const x = Math.min(e.clientX, window.innerWidth - MENU_W - 8);
        const y = Math.min(e.clientY, window.innerHeight - MENU_H - 8);
        setCtxMenu({ visible: true, x, y, article });
      };

      const handleFolderContextMenu = (e, folderPath) => {
        e.preventDefault();
        e.stopPropagation();
        const x = Math.min(e.clientX, window.innerWidth - 180 - 8);
        const y = Math.min(e.clientY, window.innerHeight - 60 - 8);
        setFolderCtxMenu({ visible: true, x, y, path: folderPath });
      };

      if (loading) {
        return (
          <div className="p-3 space-y-2">
            {[1, 2, 3, 4, 5].map(i => <div key={i} className="skeleton h-10 w-full" />)}
          </div>
        );
      }

      if (articles.length === 0) {
        return (
          <div className="text-center text-slate-400 text-xs mt-8 px-4">
            <svg className="mx-auto mb-3 text-slate-300" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" /><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" />
            </svg>
            記事がまだありません。<br />新規作成するかパイプラインを実行してください。
          </div>
        );
      }

      // 記事アイテムレンダリング
      const renderArticle = (article) => {
        const isActive = article.id === selectedId;
        const isChecked = selectMode && selectedIds && selectedIds.has(article.id);
        const isMultiSelected = multiSelectedIds && multiSelectedIds.has(article.id);
        const highlighted = isChecked || isMultiSelected;
        // 優先順位: APIのh1Title > ローカルH1キャッシュ > ファイル名フォールバック
        const displayName = article.h1Title
          || (articleH1Cache && articleH1Cache[article.id])
          || article.name.replace(/^\d{8}_\d{4}_/, '').replace('.md', '');
        const date = new Date(article.lastModified).toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });

        const handleClick = (e) => {
          // Ctrl/Cmd クリック: 個別トグル
          if (e.ctrlKey || e.metaKey) {
            e.preventDefault();
            onMultiSelect && onMultiSelect(article.id);
            lastClickedIdRef.current = article.id;
            return;
          }
          // Shift クリック: 起点から範囲選択
          if (e.shiftKey && lastClickedIdRef.current) {
            e.preventDefault();
            onRangeSelect && onRangeSelect(lastClickedIdRef.current, article.id);
            return;
          }
          // 修飾キーなし
          lastClickedIdRef.current = article.id;
          if (selectMode) { onToggleSelect(article.id); return; }
          // 複数選択中なら選択解除して通常選択
          if (multiSelectedIds && multiSelectedIds.size > 0) {
            onMultiSelect && onMultiSelect(null); // 全クリア
          }
          onSelect(article);
        };

        // 長押しドラッグ中にこの記事が対象かどうか
        const isTouchDragging = dragGhostInfo && dragArticleRef.current &&
          (Array.isArray(dragArticleRef.current)
            ? dragArticleRef.current.some(a => a.id === article.id)
            : dragArticleRef.current.id === article.id);

        return (
          <div
            key={article.id}
            className={`swipe-row mb-0.5${swipedId === article.id ? ' swiped-active' : ''}`}
            onTouchStart={(e) => onArticleTouchStart(e, article)}
            onTouchMove={onArticleTouchMove}
            onTouchEnd={onArticleTouchEnd}
          >
            {/* 左スワイプで現れるアクションボタン */}
            <div className="swipe-actions-reveal">
              <button
                className="swipe-action-btn"
                style={{ background: '#9c6ffc', color: 'white' }}
                onPointerDown={e => e.stopPropagation()}
                onClick={(e) => { e.stopPropagation(); setSwipedId(null); onDuplicateArticle(article); }}
              >
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2" /><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" /></svg>
                複製
              </button>
              <button
                className="swipe-action-btn"
                style={{ background: '#651FFF', color: 'white' }}
                onPointerDown={e => e.stopPropagation()}
                onClick={(e) => { e.stopPropagation(); setSwipedId(null); setConfirmDelete(article); }}
              >
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6" /><path d="M19 6l-1 14H6L5 6" /><path d="M10 11v6M14 11v6" /><path d="M9 6V4h6v2" /></svg>
                削除
              </button>
            </div>

            {/* スライドするコンテンツ（マウスD&Dも維持） */}
            <div
              className={`swipe-inner flex items-center gap-1${swipedId === article.id ? ' swiped' : ''}${isTouchDragging ? ' touch-dragging-item' : ''}`}
              draggable
              onDragStart={(e) => {
                dragArticleRef.current = (multiSelectedIds && multiSelectedIds.size > 0 && multiSelectedIds.has(article.id))
                  ? articles.filter(a => multiSelectedIds.has(a.id))
                  : article;
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', article.id);
              }}
              onDragEnd={() => { dragArticleRef.current = null; setDragOver(null); }}
            >
              {selectMode && (
                <button
                  onClick={(e) => { e.stopPropagation(); onToggleSelect(article.id); }}
                  className="flex-shrink-0 w-5 h-5 flex items-center justify-center rounded border transition-colors"
                  style={{ borderColor: isChecked ? '#7C4DFF' : '#cbd5e1', background: isChecked ? '#7C4DFF' : 'white' }}
                >
                  {isChecked && <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><path d="M20 6L9 17l-5-5" /></svg>}
                </button>
              )}
              <button
                onClick={handleClick}
                onContextMenu={(e) => handleContextMenu(e, article)}
                className={`flex-1 min-w-0 text-left rounded-md px-2 py-2 article-item ${isActive && !selectMode && !highlighted ? 'active' : ''} ${highlighted ? 'bg-purple-50' : ''}`}
                id={`article-item-${article.id}`}
                style={{ cursor: 'grab', outline: isMultiSelected ? '1.5px solid #7C4DFF' : undefined, outlineOffset: '-1px' }}
              >
                <div className={`text-xs font-medium truncate ${isActive && !selectMode && !highlighted ? 'text-white' : highlighted ? 'text-purple-700' : 'text-slate-700'}`}>
                  <svg className="inline mr-1 mb-0.5 opacity-60" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" /><path d="M14 2v6h6" /></svg>
                  {displayName}
                </div>
                <div className={`text-xs mt-0.5 article-date ${isActive && !selectMode && !highlighted ? 'text-purple-200' : 'text-slate-400'}`}>
                  {date} · {(article.size / 1024).toFixed(1)}KB
                </div>
              </button>
            </div>
          </div>
        );
      };

      // フォルダノードを再帰的にレンダリング（多段階対応）
      const renderFolderNode = (node, folderName, folderPath, depth = 0) => {
        // 非表示フォルダはスキップ
        if (hiddenFolders && hiddenFolders.has(folderPath)) return null;

        const isOpen = openFolders[folderPath];
        const isDragTarget = dragOver === folderPath;
        const isFolderLoading = !!folderLoading[folderPath];
        const total = countArticles(node);
        const subKeys = Object.keys(node.subfolders).sort((a, b) => b.localeCompare(a));
        const indent = depth * 12;

        return (
          <div key={folderPath} className="mb-0.5">
            {/* フォルダヘッダー（ドロップ受付） */}
            <button
              data-folder-path={folderPath}
              onClick={() => toggleFolder(folderPath, node._meta)}
              onContextMenu={(e) => handleFolderContextMenu(e, folderPath)}
              onDragOver={(e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; setDragOver(folderPath); }}
              onDragLeave={(e) => { if (!e.currentTarget.contains(e.relatedTarget)) setDragOver(null); }}
              onDrop={(e) => {
                e.preventDefault();
                setDragOver(null);
                const dragged = dragArticleRef.current;
                if (!dragged) return;
                // 複数選択ドラッグ（配列）か単一か
                const targets = Array.isArray(dragged) ? dragged : [dragged];
                const toMove = targets.filter(a => a.path !== folderPath);
                if (toMove.length === 0) return;
                onMoveArticle && onMoveArticle(toMove, folderPath);
              }}
              className={`w-full flex items-center gap-1.5 px-2 py-1.5 rounded-md folder-item text-left text-xs font-semibold text-slate-500 hover:text-slate-700${touchDragOver === folderPath ? ' touch-drag-folder-target' : ''}`}
              style={{
                paddingLeft: `${8 + indent}px`,
                background: isDragTarget ? 'rgba(124,77,255,0.1)' : undefined,
                outline: isDragTarget ? '2px dashed #7C4DFF' : undefined,
                outlineOffset: '-2px',
              }}
            >
              <svg
                width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
                style={{ transform: isOpen ? 'rotate(90deg)' : 'rotate(0deg)', transition: 'transform 0.15s', flexShrink: 0 }}
              >
                <path d="M9 18l6-6-6-6" />
              </svg>
              <svg width="13" height="13" viewBox="0 0 24 24" fill={isOpen ? '#7C4DFF' : 'none'} stroke={isOpen ? '#7C4DFF' : 'currentColor'} strokeWidth="2" style={{ flexShrink: 0 }}>
                <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z" />
              </svg>
              <span className="truncate" style={{ color: isOpen ? '#7C4DFF' : undefined }}>{folderName}</span>
              <span className="ml-auto bg-slate-100 text-slate-400 text-xs rounded-full px-1.5 py-0.5 leading-none flex-shrink-0">{isFolderLoading ? '...' : total}</span>
            </button>

            {isOpen && (
              <div style={{ marginLeft: `${4 + indent}px`, paddingLeft: '8px', borderLeft: '1px solid #f1f5f9' }}>
                {isFolderLoading && <div className="skeleton h-8 w-full my-1" />}
                {/* サブフォルダ（再帰） */}
                {subKeys.map(k => renderFolderNode(node.subfolders[k], k, folderPath ? `${folderPath}/${k}` : k, depth + 1))}
                {/* このフォルダ内の記事 */}
                {node._articles.slice(0, visibleArticleLimit).map(a => renderArticle(a))}
              </div>
            )}
          </div>
        );
      };

      const rootSubKeys = Object.keys(rootNode.subfolders).sort((a, b) => b.localeCompare(a));

      return (
        <>
          <div
            ref={sbTouchContainerRef}
            className="px-2 pb-2"
            onTouchStart={(e) => { if (swipedId && !e.target.closest('.swipe-row')) setSwipedId(null); }}
          >
            {/* ルート直下のフォルダを再帰レンダリング */}
            {rootSubKeys.map(k => renderFolderNode(rootNode.subfolders[k], k, k, 0))}

            {/* ルート直下の記事（フォルダなし） */}
            {rootNode._articles.length > 0 && (
              <div
                data-folder-path=""
                onDragOver={(e) => { e.preventDefault(); setDragOver(''); }}
                onDragLeave={() => setDragOver(null)}
                onDrop={(e) => {
                  e.preventDefault();
                  setDragOver(null);
                  const dragged = dragArticleRef.current;
                  if (!dragged) return;
                  const targets = Array.isArray(dragged) ? dragged : [dragged];
                  const toMove = targets.filter(a => a.path !== '');
                  if (toMove.length === 0) return;
                  onMoveArticle && onMoveArticle(toMove, '');
                }}
                className={touchDragOver === '' ? 'touch-drag-folder-target' : ''}
                style={{ borderRadius: '6px', outline: dragOver === '' ? '2px dashed #7C4DFF' : undefined, outlineOffset: '-2px' }}
              >
                <div className="px-2 py-1 text-xs text-slate-400 font-semibold">その他</div>
                {rootNode._articles.slice(0, visibleArticleLimit).map(a => renderArticle(a))}
              </div>
            )}
          </div>

          {/* 長押しドラッグゴースト */}
          {dragGhostInfo && (
            <div className="touch-drag-ghost" style={{ left: dragGhostInfo.x, top: dragGhostInfo.y }}>
              {dragGhostInfo.name}
            </div>
          )}

          {/* ── 右クリックコンテキストメニュー ── */}
          {ctxMenu.visible && (
            <div
              onClick={e => e.stopPropagation()}
              style={{ position: 'fixed', top: ctxMenu.y, left: ctxMenu.x, zIndex: 9999, background: 'white', borderRadius: '8px', boxShadow: '0 4px 24px rgba(0,0,0,0.15)', border: '1px solid #e2e8f0', minWidth: '190px', padding: '4px 0', overflow: 'hidden' }}
            >
              <button
                onClick={() => { onEnterSelectMode(ctxMenu.article); setCtxMenu(m => ({ ...m, visible: false })); }}
                onMouseEnter={e => e.currentTarget.style.background = '#f5f3ff'} onMouseLeave={e => e.currentTarget.style.background = 'none'}
                style={{ display: 'flex', alignItems: 'center', gap: '8px', width: '100%', padding: '9px 14px', background: 'none', border: 'none', cursor: 'pointer', fontSize: '13px', color: '#7C4DFF', textAlign: 'left', fontWeight: 600 }}
              >
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="3" y="5" width="4" height="4" rx="1" /><path d="M10 7h11M10 12h11M10 17h11" /><rect x="3" y="10" width="4" height="4" rx="1" /><rect x="3" y="15" width="4" height="4" rx="1" /></svg>
                選択
              </button>
              <div style={{ height: '1px', background: '#e2e8f0', margin: '4px 0' }} />
              <button
                onClick={() => { onDuplicateArticle(ctxMenu.article); setCtxMenu(m => ({ ...m, visible: false })); }}
                onMouseEnter={e => e.currentTarget.style.background = '#f1f5f9'} onMouseLeave={e => e.currentTarget.style.background = 'none'}
                style={{ display: 'flex', alignItems: 'center', gap: '8px', width: '100%', padding: '9px 14px', background: 'none', border: 'none', cursor: 'pointer', fontSize: '13px', color: '#334155', textAlign: 'left' }}
              >
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2" /><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" /></svg>
                複製
              </button>
              <button
                onClick={() => { setConfirmDelete(ctxMenu.article); setCtxMenu(m => ({ ...m, visible: false })); }}
                onMouseEnter={e => e.currentTarget.style.background = '#fff1f2'} onMouseLeave={e => e.currentTarget.style.background = 'none'}
                style={{ display: 'flex', alignItems: 'center', gap: '8px', width: '100%', padding: '9px 14px', background: 'none', border: 'none', cursor: 'pointer', fontSize: '13px', color: '#ef4444', textAlign: 'left' }}
              >
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6" /><path d="M19 6l-1 14H6L5 6" /><path d="M10 11v6M14 11v6" /><path d="M9 6V4h6v2" /></svg>
                削除
              </button>
              <div style={{ height: '1px', background: '#e2e8f0', margin: '4px 0' }} />
              <button
                onClick={() => {
                  window.open(ctxMenu.article.webUrl, '_blank');
                  setCtxMenu(m => ({ ...m, visible: false }));
                }}
                onMouseEnter={e => e.currentTarget.style.background = '#f1f5f9'} onMouseLeave={e => e.currentTarget.style.background = 'none'}
                style={{ display: 'flex', alignItems: 'center', gap: '8px', width: '100%', padding: '9px 14px', background: 'none', border: 'none', cursor: 'pointer', fontSize: '13px', color: '#334155', textAlign: 'left' }}
              >
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6" /><polyline points="15 3 21 3 21 9" /><line x1="10" y1="14" x2="21" y2="3" /></svg>
                OneDriveで開く
              </button>
              <button
                hidden
                onClick={() => {
                  const a = ctxMenu.article;
                  if (a.webUrl) {
                    window.open(a.webUrl, '_blank');
                  }
                  setCtxMenu(m => ({ ...m, visible: false }));
                }}
                onMouseEnter={e => e.currentTarget.style.background = '#f1f5f9'} onMouseLeave={e => e.currentTarget.style.background = 'none'}
                style={{ display: 'flex', alignItems: 'center', gap: '8px', width: '100%', padding: '9px 14px', background: 'none', border: 'none', cursor: 'pointer', fontSize: '13px', color: '#334155', textAlign: 'left' }}
              >
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="3" width="20" height="14" rx="2" /><path d="M8 21h8M12 17v4" /></svg>
                エクスプローラーで表示
              </button>
            </div>
          )}

          {/* ── フォルダ右クリックメニュー ── */}
          {folderCtxMenu.visible && (
            <div
              onClick={e => e.stopPropagation()}
              style={{ position: 'fixed', top: folderCtxMenu.y, left: folderCtxMenu.x, zIndex: 9999, background: 'white', borderRadius: '8px', boxShadow: '0 4px 24px rgba(0,0,0,0.15)', border: '1px solid #e2e8f0', minWidth: '180px', padding: '4px 0' }}
            >
              <button
                onClick={() => { onHideFolder && onHideFolder(folderCtxMenu.path); setFolderCtxMenu(m => ({ ...m, visible: false })); }}
                onMouseEnter={e => e.currentTarget.style.background = '#fff7ed'} onMouseLeave={e => e.currentTarget.style.background = 'none'}
                style={{ display: 'flex', alignItems: 'center', gap: '8px', width: '100%', padding: '9px 14px', background: 'none', border: 'none', cursor: 'pointer', fontSize: '13px', color: '#ea580c', textAlign: 'left' }}
              >
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24" /><line x1="1" y1="1" x2="23" y2="23" /></svg>
                サイドバーから非表示
              </button>
            </div>
          )}

          {/* ── 削除確認ダイアログ ── */}
          {confirmDelete && (
            <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.4)', zIndex: 10000, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <div style={{ background: 'white', borderRadius: '12px', padding: '24px', maxWidth: '360px', width: '90%', boxShadow: '0 20px 60px rgba(0,0,0,0.2)' }}>
                <div style={{ fontSize: '15px', fontWeight: 700, color: '#1e293b', marginBottom: '8px' }}>記事を削除しますか？</div>
                <div style={{ fontSize: '13px', color: '#64748b', marginBottom: '20px', lineHeight: '1.6' }}>
                  「{confirmDelete.name.replace(/^\d{8}_\d{4}_/, '').replace('.md', '')}」を削除します。<br />この操作は取り消せません。
                </div>
                <div style={{ display: 'flex', gap: '8px', justifyContent: 'flex-end' }}>
                  <button
                    onClick={() => setConfirmDelete(null)}
                    style={{ padding: '8px 16px', borderRadius: '8px', border: '1px solid #e2e8f0', background: 'white', color: '#64748b', cursor: 'pointer', fontSize: '13px', fontWeight: 600 }}
                  >キャンセル</button>
                  <button
                    onClick={() => { onDeleteArticle(confirmDelete); setConfirmDelete(null); }}
                    style={{ padding: '8px 16px', borderRadius: '8px', border: 'none', background: '#ef4444', color: 'white', cursor: 'pointer', fontSize: '13px', fontWeight: 600 }}
                  >削除する</button>
                </div>
              </div>
            </div>
          )}
        </>
      );
    }

    // === サイドバー コンポーネント ===
    function Sidebar({ articles, selectedId, onSelect, onNewArticle, loading, sidebarWidth, onResizeStart, isCollapsed, onToggle, mobileSidebarOpen, onMobileClose, onDeleteArticle, onDuplicateArticle, onMoveArticle, selectMode, selectedIds, onToggleSelect, onEnterSelectMode, multiSelectedIds, onMultiSelect, onRangeSelect, setAffModalOpen, articleH1Cache, folderMeta = {}, folderLoading = {}, onLoadFolder, externalFolderUrls = [], setExternalFolderUrls, onRefreshArticles }) {
      // 非表示フォルダ管理（localStorageで永続化）
      const [hiddenFolders, setHiddenFolders] = useState(() => {
        try { return new Set(JSON.parse(localStorage.getItem('sb_hiddenFolders') || '[]')); }
        catch { return new Set(); }
      });
      const [showFolderPicker, setShowFolderPicker] = useState(false);
      const [showLinkPicker, setShowLinkPicker] = useState(false);
      // リンク集のドラッグ＆ドロップ（HTML5対応）用ステート
      const [customLinks, setCustomLinks] = useState(() => {
        try {
          const saved = JSON.parse(localStorage.getItem('sb_customLinks'));
          if (saved && Array.isArray(saved) && saved.length > 0) return ensureInfoViewerLink(saved);
        } catch { }
        return ensureInfoViewerLink([
          { id: 'mobile-links', title: 'モバイルリンク集', url: '/links.html' },
          { id: 'note', title: 'note', url: 'https://note.com/startupm' },
          { id: 'yt-sheet', title: 'YouTube動画取得シート', url: 'https://docs.google.com/spreadsheets/d/1cw6RC1XX4nAYvfZrBq7nmTtrr2oGFsSI0r_pVIxGxAc/edit?pli=1&gid=983578135#gid=983578135' }
        ]);
      });

      // 全フォルダパス一覧（記事のpathから導出）
      const [linkDragState, setLinkDragState] = useState({ isDragging: false, startIndex: null, overIndex: null });
      const [linkTouchGhost, setLinkTouchGhost] = useState(null);
      const linkTouchRef = useRef({ timer: null, startX: 0, startY: 0, startIndex: null, overIndex: null, dragging: false, blockClickUntil: 0 });
      const LINK_LONG_PRESS_MS = 350;

      const persistCustomLinks = useCallback((updater) => {
        setCustomLinks(prevLinks => {
          const nextLinks = ensureInfoViewerLink(typeof updater === 'function' ? updater(prevLinks) : updater);
          try { localStorage.setItem('sb_customLinks', JSON.stringify(nextLinks)); } catch { }
          return nextLinks;
        });
      }, []);

      useEffect(() => {
        try { localStorage.setItem('sb_customLinks', JSON.stringify(ensureInfoViewerLink(customLinks))); } catch { }
      }, []);

      const reorderCustomLinks = useCallback((startIndex, targetIndex) => {
        if (!Number.isInteger(startIndex) || !Number.isInteger(targetIndex) || startIndex === targetIndex) return;
        persistCustomLinks((links) => {
          if (startIndex < 0 || targetIndex < 0 || startIndex >= links.length || targetIndex >= links.length) return links;
          const newLinks = [...links];
          const [moved] = newLinks.splice(startIndex, 1);
          newLinks.splice(targetIndex, 0, moved);
          return newLinks;
        });
      }, [persistCustomLinks]);

      const moveCustomLinkByStep = useCallback((index, delta) => {
        const targetIndex = index + delta;
        reorderCustomLinks(index, targetIndex);
      }, [reorderCustomLinks]);

      const clearLinkTouchTimer = useCallback(() => {
        if (linkTouchRef.current.timer) {
          clearTimeout(linkTouchRef.current.timer);
          linkTouchRef.current.timer = null;
        }
      }, []);

      const resetLinkTouchDrag = useCallback(() => {
        clearLinkTouchTimer();
        linkTouchRef.current.dragging = false;
        linkTouchRef.current.startIndex = null;
        linkTouchRef.current.overIndex = null;
        setLinkTouchGhost(null);
        setLinkDragState({ isDragging: false, startIndex: null, overIndex: null });
      }, [clearLinkTouchTimer]);

      const updateTouchLinkTarget = useCallback((clientX, clientY) => {
        const hit = document.elementFromPoint(clientX, clientY);
        const item = hit && hit.closest('[data-custom-link-index]');
        const nextIndex = item ? Number(item.dataset.customLinkIndex) : null;
        if (Number.isInteger(nextIndex) && nextIndex !== linkTouchRef.current.overIndex) {
          linkTouchRef.current.overIndex = nextIndex;
          setLinkDragState(prev => prev.isDragging ? { ...prev, overIndex: nextIndex } : prev);
        }
      }, []);

      const handleDragStartLink = (e, index) => {
        setLinkDragState({ isDragging: true, startIndex: index, overIndex: index });
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', String(index));
        if (navigator.vibrate) navigator.vibrate(40);
      };
      const handleDragOverLink = (e, index) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        if (linkDragState.overIndex !== index) {
          setLinkDragState(prev => ({ ...prev, overIndex: index }));
        }
      };
      const handleDropLink = (e, targetIndex) => {
        e.preventDefault();
        reorderCustomLinks(linkDragState.startIndex, targetIndex);
        setLinkDragState({ isDragging: false, startIndex: null, overIndex: null });
      };
      const handleDragEndLink = () => {
        setLinkDragState({ isDragging: false, startIndex: null, overIndex: null });
      };
      const handleTouchStartLink = (e, index, title) => {
        if (e.touches.length !== 1) return;
        const touch = e.touches[0];
        clearLinkTouchTimer();
        linkTouchRef.current.startX = touch.clientX;
        linkTouchRef.current.startY = touch.clientY;
        linkTouchRef.current.startIndex = index;
        linkTouchRef.current.overIndex = index;
        linkTouchRef.current.dragging = false;
        linkTouchRef.current.timer = setTimeout(() => {
          linkTouchRef.current.timer = null;
          linkTouchRef.current.dragging = true;
          linkTouchRef.current.blockClickUntil = Date.now() + 450;
          setLinkDragState({ isDragging: true, startIndex: index, overIndex: index });
          setLinkTouchGhost({ x: touch.clientX, y: touch.clientY, name: title });
          if (navigator.vibrate) navigator.vibrate(40);
        }, LINK_LONG_PRESS_MS);
      };
      const handleTouchMoveLink = (e) => {
        const touch = e.touches[0];
        if (!touch) return;
        if (linkTouchRef.current.dragging) {
          e.preventDefault();
          setLinkTouchGhost(prev => prev ? { ...prev, x: touch.clientX, y: touch.clientY } : null);
          updateTouchLinkTarget(touch.clientX, touch.clientY);
          return;
        }
        const dx = touch.clientX - linkTouchRef.current.startX;
        const dy = touch.clientY - linkTouchRef.current.startY;
        if (Math.abs(dx) > 10 || Math.abs(dy) > 10) clearLinkTouchTimer();
      };
      const handleTouchEndLink = (e, fallbackIndex) => {
        clearLinkTouchTimer();
        if (!linkTouchRef.current.dragging) return;
        e.preventDefault();
        const targetIndex = Number.isInteger(linkTouchRef.current.overIndex) ? linkTouchRef.current.overIndex : fallbackIndex;
        reorderCustomLinks(linkTouchRef.current.startIndex, targetIndex);
        resetLinkTouchDrag();
      };
      const handleTouchCancelLink = () => {
        resetLinkTouchDrag();
      };
      const blockLinkClickIfNeeded = (e) => {
        if (linkTouchRef.current.dragging || Date.now() < linkTouchRef.current.blockClickUntil) {
          e.preventDefault();
          e.stopPropagation();
          return true;
        }
        return false;
      };

      const allFolderPaths = useMemo(() => {
        const paths = new Set();
        Object.keys(folderMeta || {}).forEach(path => {
          if (path) paths.add(path);
        });
        for (const a of articles) {
          const parts = (a.path || '').trim().split('/').filter(Boolean);
          let acc = '';
          for (const part of parts) {
            acc = acc ? `${acc}/${part}` : part;
            paths.add(acc);
          }
        }
        return [...paths].sort((a, b) => a.localeCompare(b));
      }, [articles, folderMeta]);

      const toggleFolderVisibility = useCallback((folderPath) => {
        setHiddenFolders(prev => {
          const next = new Set(prev);
          next.has(folderPath) ? next.delete(folderPath) : next.add(folderPath);
          try { localStorage.setItem('sb_hiddenFolders', JSON.stringify([...next])); } catch { }
          return next;
        });
      }, []);

      // フォルダピッカー・リンクピッカー外クリックで閉じる
      const pickerRef = useRef(null);
      const linkPickerRef = useRef(null);
      useEffect(() => {
        const close = (e) => {
          if (showFolderPicker && pickerRef.current && !pickerRef.current.contains(e.target)) setShowFolderPicker(false);
          if (showLinkPicker && linkPickerRef.current && !linkPickerRef.current.contains(e.target)) setShowLinkPicker(false);
        };
        window.addEventListener('pointerdown', close);
        return () => window.removeEventListener('pointerdown', close);
      }, [showFolderPicker, showLinkPicker]);

      const folderTreeProps = {
        articles, selectedId, loading,
        onDeleteArticle, onDuplicateArticle, onMoveArticle,
        hiddenFolders, onHideFolder: toggleFolderVisibility,
        selectMode, selectedIds, onToggleSelect, onEnterSelectMode,
        multiSelectedIds, onMultiSelect, onRangeSelect,
        articleH1Cache,
        folderMeta, folderLoading, onLoadFolder,
      };

      // サイドバー下部フッター（＋ボタン + フォルダピッカー）
      const SidebarFooter = () => (
        <div className="border-t border-slate-100 px-2 py-1.5 flex flex-col gap-1 relative" style={{ flexShrink: 0 }}>
          {/* アフィリンク */}
          <button
            onClick={() => setAffModalOpen(true)}
            className="w-full flex items-center gap-1.5 text-xs text-slate-400 hover:text-purple-600 hover:bg-purple-50 rounded-md px-2 py-1.5 transition-colors"
            title="アフィリエイトリンク管理"
          >
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" />
              <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" />
            </svg>
            アフィリンク
          </button>

          {/* リンク集 */}
          <button
            onClick={() => setShowLinkPicker(v => !v)}
            className="w-full flex items-center gap-1.5 text-xs text-slate-400 hover:text-purple-600 hover:bg-purple-50 rounded-md px-2 py-1.5 transition-colors"
            title="リンク集"
          >
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" /></svg>
            リンク集
          </button>

          {/* リンク集パネル */}
          {showLinkPicker && (
            <div
              ref={linkPickerRef}
              onPointerDown={(e) => e.stopPropagation()}
              style={mobileSidebarOpen
                ? { position: 'fixed', left: '12px', right: '12px', bottom: '84px', zIndex: 99999, background: 'white', border: '1px solid #e2e8f0', borderRadius: '10px', boxShadow: '0 8px 32px rgba(0,0,0,0.22)', display: 'flex', flexDirection: 'column' }
                : { position: 'absolute', bottom: '100%', left: '8px', right: '8px', zIndex: 9998, background: 'white', border: '1px solid #e2e8f0', borderRadius: '10px', boxShadow: '0 8px 32px rgba(0,0,0,0.15)', display: 'flex', flexDirection: 'column', marginBottom: '4px' }
              }
            >
              <div style={{ padding: '10px 12px 8px', borderBottom: '1px solid #f1f5f9', fontSize: '12px', fontWeight: 700, color: '#7C4DFF', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <span>カスタムリンク集</span>
              </div>
              <div style={{ background: '#f8fafc', padding: '8px 12px', borderRadius: '0 0 10px 10px', flexShrink: 0 }}>
                <div style={{ fontSize: '11px', fontWeight: 600, color: '#64748b', marginBottom: '8px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <span>URLリスト</span>
                  <button onClick={() => {
                    const title = prompt('追加するリンクのタイトルを入力:');
                    if (!title || !title.trim()) return;
                    const url = prompt('URLを入力:');
                    if (url && url.trim()) {
                      persistCustomLinks([...customLinks, { id: 'link_' + Date.now(), title: title.trim(), url: url.trim() }]);
                    }
                  }} style={{ background: 'none', border: 'none', color: '#7C4DFF', cursor: 'pointer', fontSize: '11px', fontWeight: 700 }}>＋ 追加</button>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: '6px', maxHeight: '250px', overflowY: 'auto', paddingBottom: '4px' }}>
                  {customLinks.map((link, idx) => (
                    <div
                      key={link.id}
                      data-custom-link-index={idx}
                      className="custom-link-item"
                      draggable={false}
                      onDragOver={(e) => handleDragOverLink(e, idx)}
                      onDrop={(e) => handleDropLink(e, idx)}
                      style={{
                        display: 'flex', alignItems: 'center', gap: '6px', background: 'white', padding: '4px 6px',
                        borderRadius: '6px', border: linkDragState.overIndex === idx && linkDragState.startIndex !== idx ? '1px dashed #7C4DFF' : '1px solid #e2e8f0',
                        boxShadow: '0 1px 2px rgba(0,0,0,0.02)',
                        opacity: linkDragState.startIndex === idx ? 0.4 : 1,
                        transition: 'border 0.2s, opacity 0.2s',
                        touchAction: 'manipulation'
                      }}
                    >
                      <div
                        draggable={true}
                        onDragStart={(e) => handleDragStartLink(e, idx)}
                        onDragEnd={handleDragEndLink}
                        onTouchStart={(e) => handleTouchStartLink(e, idx, link.title)}
                        onTouchMove={handleTouchMoveLink}
                        onTouchEnd={(e) => handleTouchEndLink(e, idx)}
                        onTouchCancel={handleTouchCancelLink}
                        onContextMenu={(e) => e.preventDefault()}
                        style={{ cursor: 'grab', display: 'flex', alignItems: 'center', padding: '2px 4px', color: '#cbd5e1', touchAction: 'none', userSelect: 'none', WebkitUserSelect: 'none', WebkitTouchCallout: 'none' }}
                        title="ここを掴んでドラッグして並び替え"
                      >
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M8 6h8M8 12h8M8 18h8" /></svg>
                      </div>
                      <a
                        href={link.url}
                        target={link.url.startsWith('/') ? '_self' : '_blank'}
                        rel="noopener noreferrer"
                        draggable={false}
                        onDragStart={(e) => e.preventDefault()}
                        onClick={(e) => {
                          if (blockLinkClickIfNeeded(e)) return;
                          if (link.url.startsWith('/')) {
                            e.preventDefault();
                            setShowLinkPicker(false);
                            if (typeof onMobileClose === 'function') onMobileClose();
                            window.location.assign(link.url);
                          }
                        }}
                        className="flex items-center gap-2 text-[11px] text-slate-600 hover:text-[#7C4DFF] hover:bg-purple-50 rounded-md px-1.5 py-1 transition-all"
                        style={{ textDecoration: 'none', flex: 1, minWidth: 0, userSelect: 'none' }}
                        title={link.url}
                      >
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" style={{ flexShrink: 0, display: 'none' }}>
                          <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" />
                          <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" />
                        </svg>
                        <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', fontWeight: 500 }}>{link.title}</span>
                      </a>
                      <div style={{ display: 'flex', flexDirection: 'column', gap: '2px', flexShrink: 0 }}>
                        <button
                          onClick={() => {
                            if (Date.now() < linkTouchRef.current.blockClickUntil) return;
                            moveCustomLinkByStep(idx, -1);
                          }}
                          disabled={idx === 0}
                          title="上へ移動"
                          style={{
                            width: '20px', height: '18px', display: 'flex', alignItems: 'center', justifyContent: 'center',
                            color: idx === 0 ? '#cbd5e1' : '#64748b',
                            cursor: idx === 0 ? 'not-allowed' : 'pointer',
                            background: '#f8fafc', border: '1px solid #e2e8f0', borderRadius: '4px', flexShrink: 0
                          }}
                        >
                          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 15l-6-6-6 6" /></svg>
                        </button>
                        <button
                          onClick={() => {
                            if (Date.now() < linkTouchRef.current.blockClickUntil) return;
                            moveCustomLinkByStep(idx, 1);
                          }}
                          disabled={idx === customLinks.length - 1}
                          title="下へ移動"
                          style={{
                            width: '20px', height: '18px', display: 'flex', alignItems: 'center', justifyContent: 'center',
                            color: idx === customLinks.length - 1 ? '#cbd5e1' : '#64748b',
                            cursor: idx === customLinks.length - 1 ? 'not-allowed' : 'pointer',
                            background: '#f8fafc', border: '1px solid #e2e8f0', borderRadius: '4px', flexShrink: 0
                          }}
                        >
                          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M6 9l6 6 6-6" /></svg>
                        </button>
                      </div>
                      <button onClick={() => {
                        if (Date.now() < linkTouchRef.current.blockClickUntil) return;
                        if (linkTouchRef.current.dragging) return;
                        const newTitle = prompt('タイトルを編集:', link.title);
                        if (newTitle === null) return;
                        const newUrl = prompt('URLを編集:', link.url);
                        if (newUrl === null) return;
                        if (newTitle.trim() && newUrl.trim()) {
                          persistCustomLinks((links) => {
                            const newLinks = [...links];
                            newLinks[idx] = { ...newLinks[idx], title: newTitle.trim(), url: newUrl.trim() };
                            return newLinks;
                          });
                        }
                      }} style={{ fontSize: '10px', color: '#64748b', cursor: 'pointer', background: '#f1f5f9', border: 'none', padding: '2px 6px', borderRadius: '4px', flexShrink: 0 }}>編集</button>
                      <button onClick={() => {
                        if (Date.now() < linkTouchRef.current.blockClickUntil) return;
                        if (linkTouchRef.current.dragging) return;
                        if (confirm('このリンクを削除しますか？')) {
                          persistCustomLinks(customLinks.filter((_, i) => i !== idx));
                        }
                      }} style={{ fontSize: '10px', color: '#ef4444', cursor: 'pointer', background: '#fff1f2', border: 'none', padding: '2px 6px', borderRadius: '4px', flexShrink: 0 }}>削除</button>
                    </div>
                  ))}
                </div>
                {linkTouchGhost && (
                  <div className="touch-drag-ghost" style={{ left: linkTouchGhost.x, top: linkTouchGhost.y }}>
                    {linkTouchGhost.name}
                  </div>
                )}
              </div>
            </div>
          )}

          {/* フォルダ管理 */}
          <div className="flex items-center gap-1 w-full relative">
            <button
              onClick={() => setShowFolderPicker(v => !v)}
              className="w-full flex items-center gap-1.5 text-xs text-slate-400 hover:text-purple-600 hover:bg-purple-50 rounded-md px-2 py-1.5 transition-colors"
              title="表示フォルダを管理"
            >
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 5v14M5 12h14" /></svg>
              フォルダ管理
            </button>
            {hiddenFolders.size > 0 && (
              <span className="absolute right-2 text-[10px] bg-orange-100 text-orange-500 rounded-full px-1.5 py-0.5 leading-none pointer-events-none">{hiddenFolders.size}非表示</span>
            )}
          </div>
          {/* フォルダピッカーパネル */}
          {showFolderPicker && (
            <div
              ref={pickerRef}
              style={{ position: 'absolute', bottom: '100%', left: '8px', right: '8px', zIndex: 9998, background: 'white', border: '1px solid #e2e8f0', borderRadius: '10px', boxShadow: '0 8px 32px rgba(0,0,0,0.15)', maxHeight: '450px', display: 'flex', flexDirection: 'column' }}
            >
              <div style={{ padding: '10px 12px 8px', borderBottom: '1px solid #f1f5f9', fontSize: '12px', fontWeight: 700, color: '#7C4DFF', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexShrink: 0 }}>
                <span>表示フォルダの管理</span>
                {hiddenFolders.size > 0 && (
                  <button
                    onClick={() => setHiddenFolders(prev => { localStorage.removeItem('sb_hiddenFolders'); return new Set(); })}
                    style={{ fontSize: '11px', color: '#64748b', background: 'none', border: 'none', cursor: 'pointer', padding: '2px 6px', borderRadius: '4px' }}
                  >すべて表示</button>
                )}
              </div>
              <div style={{ overflowY: 'auto', flex: 1, padding: '4px 0' }}>
                {allFolderPaths.length === 0 ? (
                  <div style={{ padding: '12px', fontSize: '12px', color: '#94a3b8', textAlign: 'center' }}>フォルダが見つかりません</div>
                ) : allFolderPaths.map(fp => {
                  const isHidden = hiddenFolders.has(fp);
                  const depth = fp.split('/').length - 1;
                  const name = fp.split('/').pop();
                  return (
                    <button
                      key={fp}
                      onClick={() => toggleFolderVisibility(fp)}
                      style={{ display: 'flex', alignItems: 'center', gap: '8px', width: '100%', padding: '7px 12px', background: 'none', border: 'none', cursor: 'pointer', textAlign: 'left', paddingLeft: `${12 + depth * 14}px` }}
                      onMouseEnter={e => e.currentTarget.style.background = '#f8fafc'}
                      onMouseLeave={e => e.currentTarget.style.background = 'none'}
                    >
                      <span style={{ width: '16px', height: '16px', borderRadius: '4px', border: `1.5px solid ${isHidden ? '#cbd5e1' : '#7C4DFF'}`, background: isHidden ? 'white' : '#7C4DFF', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                        {!isHidden && <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><path d="M20 6L9 17l-5-5" /></svg>}
                      </span>
                      <svg width="12" height="12" viewBox="0 0 24 24" fill={isHidden ? 'none' : '#7C4DFF'} stroke={isHidden ? '#94a3b8' : '#7C4DFF'} strokeWidth="2" style={{ flexShrink: 0 }}>
                        <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z" />
                      </svg>
                      <span style={{ fontSize: '12px', color: isHidden ? '#94a3b8' : '#334155', textDecoration: isHidden ? 'line-through' : 'none', flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{name}</span>
                    </button>
                  );
                })}
              </div>

              {/* 追加: 外部フォルダ(URL)管理セクション */}
              <div style={{ borderTop: '1px solid #f1f5f9', background: '#f8fafc', padding: '8px 12px', borderRadius: '0 0 10px 10px', flexShrink: 0 }}>
                <div style={{ fontSize: '11px', fontWeight: 600, color: '#64748b', marginBottom: '6px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <span>URL指定で追加</span>
                  <button onClick={() => {
                    const url = prompt('フォルダのURL(共有リンク)を入力:');
                    if (url && url.trim()) {
                      const newUrls = [...(externalFolderUrls || []), url.trim()];
                      if (setExternalFolderUrls) setExternalFolderUrls(newUrls);
                      try { localStorage.setItem('sb_externalFolderUrls', JSON.stringify(newUrls)); } catch { }
                      if (onRefreshArticles) onRefreshArticles(newUrls);
                    }
                  }} style={{ background: 'none', border: 'none', color: '#7C4DFF', cursor: 'pointer', fontSize: '11px', fontWeight: 700 }}>＋ 追加</button>
                </div>
                {externalFolderUrls && externalFolderUrls.length > 0 && (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '4px', maxHeight: '80px', overflowY: 'auto', paddingBottom: '4px' }}>
                    {externalFolderUrls.map((extUrl, idx) => (
                      <div key={idx} style={{ display: 'flex', alignItems: 'center', gap: '6px', background: 'white', padding: '4px 6px', borderRadius: '6px', border: '1px solid #e2e8f0', boxShadow: '0 1px 2px rgba(0,0,0,0.02)' }}>
                        <div style={{ flex: 1, fontSize: '10px', color: '#475569', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }} title={extUrl}>{extUrl}</div>
                        <button onClick={() => {
                          const newUrl = prompt('URLを編集:', extUrl);
                          if (newUrl && newUrl.trim()) {
