                            const newUrls = [...externalFolderUrls];
                            newUrls[idx] = newUrl.trim();
                            if (setExternalFolderUrls) setExternalFolderUrls(newUrls);
                            try { localStorage.setItem('sb_externalFolderUrls', JSON.stringify(newUrls)); } catch { }
                            if (onRefreshArticles) onRefreshArticles(newUrls);
                          }
                        }} style={{ fontSize: '10px', color: '#64748b', cursor: 'pointer', background: '#f1f5f9', border: 'none', padding: '2px 6px', borderRadius: '4px' }}>編集</button>
                        <button onClick={() => {
                          if (confirm('このURLを削除しますか？')) {
                            const newUrls = externalFolderUrls.filter((_, i) => i !== idx);
                            if (setExternalFolderUrls) setExternalFolderUrls(newUrls);
                            try { localStorage.setItem('sb_externalFolderUrls', JSON.stringify(newUrls)); } catch { }
                            if (onRefreshArticles) onRefreshArticles(newUrls);
                          }
                        }} style={{ fontSize: '10px', color: '#ef4444', cursor: 'pointer', background: '#fff1f2', border: 'none', padding: '2px 6px', borderRadius: '4px' }}>削除</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );

      return (
        <>
          {/* ── モバイル: オーバーレイ + ドロワー ── */}
          {mobileSidebarOpen && (
            <div className="lg:hidden mobile-overlay" onClick={onMobileClose} />
          )}
          <div className={`lg:hidden mobile-drawer ${mobileSidebarOpen ? 'open' : ''}`}>
            <div className="p-3 border-b border-slate-100 bg-gradient-to-r from-[#7C4DFF] to-[#651FFF] flex items-center gap-2">
              <button
                onClick={() => { onNewArticle(); onMobileClose(); }}
                className="flex-1 flex items-center justify-center gap-2 bg-white/20 hover:bg-white/30 text-white font-bold rounded-lg px-4 py-2.5 transition-colors text-sm"
              >
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 5v14M5 12h14" /></svg>
                新規作成
              </button>
              <button onClick={onMobileClose} className="text-white/70 hover:text-white p-1.5 rounded-lg hover:bg-white/20 transition-colors flex-shrink-0" title="閉じる">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 6L6 18M6 6l12 12" /></svg>
              </button>
            </div>
            <div className="flex-1 overflow-y-auto py-2">
              <FolderTree {...folderTreeProps} onSelect={(a) => { onSelect(a); onMobileClose(); }} />
            </div>
            <SidebarFooter />
          </div>

          {/* ── デスクトップ: インラインサイドバー ── */}
          <div className="hidden lg:flex h-screen" style={{ position: 'relative' }}>
            <aside
              style={{ width: isCollapsed ? 0 : sidebarWidth, transition: isCollapsed ? 'width 0.25s' : 'none', overflow: 'hidden' }}
              className="h-screen bg-white border-r border-slate-200 flex flex-col flex-shrink-0"
            >
              <div className="p-3 border-b border-slate-100 bg-gradient-to-r from-[#7C4DFF] to-[#651FFF]">
                <button
                  onClick={onNewArticle}
                  className="w-full flex items-center justify-center gap-2 bg-white/20 hover:bg-white/30 text-white font-bold rounded-lg px-4 py-2.5 transition-colors text-sm"
                  id="new-article-btn"
                >
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 5v14M5 12h14" /></svg>
                  新規作成
                </button>
              </div>
              <div className="flex-1 overflow-y-auto py-2">
                <FolderTree {...folderTreeProps} onSelect={onSelect} />
              </div>
              <SidebarFooter />
            </aside>
            {!isCollapsed && (
              <div className="sidebar-resize-handle h-full" onMouseDown={onResizeStart} />
            )}
            <button
              className="sidebar-toggle"
              onClick={onToggle}
              title={isCollapsed ? 'サイドバーを開く' : 'サイドバーを閉じる'}
            >
              <svg
                width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"
                style={{ transform: isCollapsed ? 'rotate(0deg)' : 'rotate(180deg)', transition: 'transform 0.2s' }}
              >
                <path d="M15 18l-6-6 6-6" />
              </svg>
            </button>
          </div>
        </>
      );
    }

    // === アフィリエイトリンクモーダル（動的MEMO・更新ボタン・紫配色） ===
    function AffiliateLinkModal({ isOpen, onClose, showToast }) {
      const [memos, setMemos] = useState({});
      const [memoKeys, setMemoKeys] = useState(['memo1']);
      const [act, setAct] = useState('memo1');
      const [ld, setLd] = useState(false);
      const [sv, setSv] = useState(false);
      const [cp, setCp] = useState(false);
      // モーダルサイズ（リサイズ対応）
      const [modalW, setModalW] = useState(680);
      const [modalH, setModalH] = useState(600);
      const resizing = useRef(false);
      const resizeStart = useRef({ x: 0, y: 0, w: 0, h: 0 });
      // アフィリエイト自動保存（ユーザー編集時のみ）
      const affAutoSaveTimer = useRef(null);
      const affUserEdited = useRef(false); // ユーザーが実際に編集したかを追跡

      const doLoad = useCallback(() => {
        setLd(true);
        affUserEdited.current = false; // ロード中はユーザー編集フラグをリセット
        fetchAffiliateMemos()
          .then(d => {
            setMemos(d);
            const keys = Object.keys(d).sort((a, b) =>
              parseInt(a.replace('memo', ''), 10) - parseInt(b.replace('memo', ''), 10)
            );
            setMemoKeys(keys.length > 0 ? keys : ['memo1']);
            setAct(prev => keys.includes(prev) ? prev : (keys[0] || 'memo1'));
          })
          .catch(e => showToast('アフィリンク取得失敗: ' + e.message, 'error'))
          .finally(() => setLd(false));
      }, [showToast]);

      useEffect(() => { if (isOpen) doLoad(); }, [isOpen]);

      // モーダルリサイズ用マウスイベント
      useEffect(() => {
        const onMove = (e) => {
          if (!resizing.current) return;
          const dx = e.clientX - resizeStart.current.x;
          const dy = e.clientY - resizeStart.current.y;
          setModalW(Math.max(400, Math.min(window.innerWidth * 0.95, resizeStart.current.w + dx)));
          setModalH(Math.max(300, Math.min(window.innerHeight * 0.95, resizeStart.current.h + dy)));
        };
        const onUp = () => {
          resizing.current = false;
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
        return () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
      }, []);

      // memos変更時の自動保存（ユーザー編集時のみ・2秒デバウンス）
      // affUserEdited.current=true のときのみ保存（初回ロード時の上書きを防止）
      useEffect(() => {
        if (!affUserEdited.current) return;
        clearTimeout(affAutoSaveTimer.current);
        affAutoSaveTimer.current = setTimeout(() => {
          saveAffiliateMemos(memos).catch(() => { });
        }, 2000);
        return () => clearTimeout(affAutoSaveTimer.current);
      }, [memos]);

      const doSave = async () => {
        setSv(true);
        try { await saveAffiliateMemos(memos); showToast('💾 アフィリンクをOneDriveに保存しました！', 'success'); }
        catch (e) { showToast('保存失敗: ' + e.message, 'error'); }
        finally { setSv(false); }
      };

      const doCopy = async () => {
        try { await navigator.clipboard.writeText(memos[act] || ''); setCp(true); setTimeout(() => setCp(false), 2000); }
        catch { showToast('コピーに失敗しました', 'error'); }
      };

      if (!isOpen) return null;

      return (
        <div className="aff-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="aff-modal" style={{ width: modalW + 'px', height: modalH + 'px' }}>
            {/* ヘッダー */}
            <div style={{ padding: '0.75rem 1.25rem', borderBottom: '1px solid #e2e8f0', display: 'flex', alignItems: 'center', justifyContent: 'space-between', background: 'linear-gradient(135deg,#f5f3ff,#ede9fe)', flexShrink: 0 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                <span style={{ fontSize: '1.1rem' }}>🔗</span>
                <h3 style={{ fontWeight: 700, color: '#1e293b', fontSize: '0.95rem', margin: 0 }}>アフィリエイトリンク管理</h3>
                <span style={{ fontSize: '0.65rem', color: '#7C4DFF', background: '#ede9fe', padding: '0.15rem 0.5rem', borderRadius: '9999px' }}>OneDrive同期</span>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: '0.375rem' }}>
                {/* 更新ボタン */}
                <button
                  onClick={doLoad} disabled={ld}
                  style={{ padding: '0.375rem', borderRadius: '0.5rem', border: '1px solid #ddd6fe', background: 'white', cursor: ld ? 'not-allowed' : 'pointer', color: '#7C4DFF', lineHeight: 0, transition: 'all 0.15s' }}
                  title="OneDriveから最新を読み込む"
                >
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{ animation: ld ? 'spin 0.8s linear infinite' : 'none' }}>
                    <path d="M1 4v6h6M23 20v-6h-6" /><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15" />
                  </svg>
                </button>
                <button onClick={onClose} style={{ padding: '0.375rem', borderRadius: '0.5rem', border: 'none', background: 'transparent', cursor: 'pointer', color: '#94a3b8', lineHeight: 0 }} title="閉じる">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 6L6 18M6 6l12 12" /></svg>
                </button>
              </div>
            </div>
            {/* タブ（数字のみ・動的） */}
            <div style={{ display: 'flex', borderBottom: '1px solid #e2e8f0', paddingLeft: '1rem', flexShrink: 0, overflowX: 'auto' }}>
              {memoKeys.map(k => {
                const num = k.replace('memo', '');
                return (
                  <button key={k} onClick={() => setAct(k)} className={`aff-tab ${act === k ? 'active' : ''}`}>
                    {num}
                    {memos[k] && memos[k].trim() && <span style={{ marginLeft: '0.3rem', width: '5px', height: '5px', borderRadius: '50%', background: '#7C4DFF', display: 'inline-block', verticalAlign: 'middle' }} />}
                  </button>
                );
              })}
            </div>
            {/* 本文 */}
            {ld ? (
              <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <div style={{ textAlign: 'center' }}>
                  <div className="skeleton" style={{ width: '2.5rem', height: '2.5rem', borderRadius: '50%', margin: '0 auto 0.75rem' }} />
                  <p style={{ color: '#94a3b8', fontSize: '0.875rem' }}>OneDriveから読み込み中...</p>
                </div>
              </div>
            ) : (
              <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: '0.75rem 1rem', overflow: 'hidden' }}>
                <textarea className="aff-ta" value={memos[act] || ''} onChange={e => { affUserEdited.current = true; setMemos(p => ({ ...p, [act]: e.target.value })); }} placeholder="アフィリエイトリンクを入力..." spellCheck={false} id={`aff-textarea-${act}`} />
              </div>
            )}
            {/* フッター */}
            <div style={{ padding: '0.75rem 1rem', borderTop: '1px solid #e2e8f0', display: 'flex', alignItems: 'center', justifyContent: 'space-between', background: '#f8fafc', flexShrink: 0 }}>
              <button onClick={doCopy} style={{ display: 'flex', alignItems: 'center', gap: '0.375rem', padding: '0.5rem 0.75rem', borderRadius: '0.5rem', border: '1px solid #e2e8f0', background: 'white', color: cp ? '#10B981' : '#64748b', cursor: 'pointer', fontSize: '0.8rem', fontWeight: 600 }} title="全文コピー">
                {cp ? <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M20 6L9 17l-5-5" /></svg> : <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2" /><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" /></svg>}
                {cp ? 'コピー済み' : '全文コピー'}
              </button>
              <div style={{ display: 'flex', gap: '0.5rem' }}>
                <button onClick={onClose} style={{ padding: '0.5rem 1rem', borderRadius: '0.5rem', border: '1px solid #e2e8f0', background: 'white', color: '#64748b', cursor: 'pointer', fontSize: '0.8rem', fontWeight: 600 }}>閉じる</button>

                  {sv ? (<><svg className="animate-spin" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12a9 9 0 11-6.219-8.56" /></svg>保存中...</>) : (<><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" /><path d="M17 21v-8H7v8M7 3v5h8" /></svg>保存</>)}
                </button>

            >

          </div>
        </div>
      );
    }

    // ── OGP ヘルパー（Appコンポーネント外・純粋関数） ──────────────
    function _esc(s) {
      return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
    }
    function buildOgpCard(href, title, description, image, domain) {
      const card = document.createElement('a');
      card.href = href; card.target = '_blank'; card.rel = 'noopener noreferrer';
      card.className = 'ogp-card';
      card.innerHTML = [
        `<div class="ogp-card-body">`,
        domain ? `<div class="ogp-card-domain">${_esc(domain)}</div>` : '',
        title ? `<div class="ogp-card-title">${_esc(title)}</div>` : '',
        description ? `<div class="ogp-card-desc">${_esc(description)}</div>` : '',
        `</div>`,
        image ? `<img class="ogp-card-image" src="${_esc(image)}" alt="" loading="lazy" onerror="this.style.display='none'" />` : '',
      ].join('');
      return card;
    }
    function insertOgpCard(a, card) {
      if (!a || !a.isConnected) return;
      const p = a.parentElement;
      if (!p || p.tagName !== 'P') { a.replaceWith(card); return; }
      const pText = (p.textContent || '').trim();
      const aText = (a.textContent || '').trim();
      if (pText === aText) {
        if (p.dataset.line) card.dataset.line = p.dataset.line;
        p.replaceWith(card);
      } else {
        const prev = a.previousSibling;
        if (prev && prev.nodeName === 'BR') prev.remove();
        a.remove();
        if ((p.textContent || '').trim() === '') {
          if (p.dataset.line) card.dataset.line = p.dataset.line;
          p.replaceWith(card);
        }
        else p.after(card);
      }
    }
    function isOgpUrl(a) {
      const href = a.getAttribute('href') || '';
      if (!href.startsWith('http')) return false;
      const text = (a.textContent || '').trim();
      return text === href || text === href.replace(/^https?:\/\//, '');
    }

    function mergeArticlesById(current, incoming) {
      const map = new Map((current || []).map(article => [article.id, article]));
      (incoming || []).forEach(article => map.set(article.id, { ...(map.get(article.id) || {}), ...article }));
      return [...map.values()].sort((a, b) => new Date(b.lastModified) - new Date(a.lastModified));
    }

    function foldersToMeta(folders, previous = {}) {
      const next = { ...previous };
      (folders || []).forEach(folder => {
        if (!folder || !folder.path) return;
        next[folder.path] = { ...(next[folder.path] || {}), ...folder };
      });
      return next;
    }

    // === メインアプリ ===

      const [ogpTrigger, setOgpTrigger] = useState(0);

      const ogpCacheRef = useRef({});
      // トークン→ソース行マッピング（スクロール同期用）
      const tokenLineMapRef = useRef([]);

      const hasChanges = content !== originalContent;
      const selectedArticleRef = useRef(null);
      useEffect(() => { selectedArticleRef.current = selectedArticle; }, [selectedArticle]);

      // 記事H1キャッシュ（localStorageで永続化: サイドバータイトル表示に使用）
      const [articleH1Cache, setArticleH1Cache] = useState(() => {
        try { return JSON.parse(localStorage.getItem('sb_articleH1Cache') || '{}'); }
        catch { return {}; }
      });

      // YouTube元動画URL（GitHub Variables → localStorage キャッシュ）
      const [youtubeSrcUrls, setYoutubeSrcUrls] = useState(() => {

      // YouTube URL 手動入力 state（既存記事のリンク設定用）

      const saveYtUrl = () => {

        setYoutubeSrcUrls(prev => {

          try { localStorage.setItem('sb_youtubeSrcUrls', JSON.stringify(next)); } catch { }

      // 検索マッチ一覧
      const findMatches = useMemo(() => {
        if (!findText || !showFindReplace) return [];
        const matches = [];
        let idx = 0;
        while (idx < content.length) {
          const pos = content.indexOf(findText, idx);
          if (pos === -1) break;
          matches.push(pos);
          idx = pos + findText.length;
        }
        return matches;
      }, [content, findText, showFindReplace]);

      const safeMatchIndex = findMatches.length > 0 ? Math.min(matchIndex, findMatches.length - 1) : 0;

      // サイドバー幅リサイズ
      const [sidebarWidth, setSidebarWidth] = useState(260);
      const sidebarDragging = useRef(false);
      const sidebarStartX = useRef(0);
      const sidebarStartW = useRef(0);

      const onSidebarResizeStart = useCallback((e) => {
        sidebarDragging.current = true;
        sidebarStartX.current = e.clientX;
        sidebarStartW.current = sidebarWidth;

      // エディタ/プレビュー分割リサイズ
      const [editorRatio, setEditorRatio] = useState(0.5); // 0~1
      const editorDragging = useRef(false);
      const editorStartX = useRef(0);
      const editorStartRatio = useRef(0.5);
      const editorAreaRef = useRef(null);

      const onEditorResizeStart = useCallback((e) => {
        editorDragging.current = true;
        editorStartX.current = e.clientX;
        editorStartRatio.current = editorRatio;
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
      }, [editorRatio]);

      useEffect(() => {
        const onMove = (e) => {
          if (sidebarDragging.current) {
            const delta = e.clientX - sidebarStartX.current;
            setSidebarWidth(Math.min(480, Math.max(180, sidebarStartW.current + delta)));
          }
          if (editorDragging.current && editorAreaRef.current) {
            const rect = editorAreaRef.current.getBoundingClientRect();
            const ratio = (e.clientX - rect.left) / rect.width;
            setEditorRatio(Math.min(0.85, Math.max(0.15, ratio)));
          }
        };
        const onUp = () => {
          if (sidebarDragging.current || editorDragging.current) {
            sidebarDragging.current = false;
            editorDragging.current = false;
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
          }
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
        return () => {
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
        };
      }, []);

      // 記事一覧取得
      const loadArticles = useCallback(async (exUrls = null) => {
        setLoading(true);
        try {
          const targetUrls = exUrls !== null ? exUrls : externalFolderUrls;
          const data = await fetchArticles(targetUrls, { raw: true, mode: 'shallow', h1Limit: 3 });
          const initialArticles = data.articles || [];
          const selected = selectedArticleRef.current;
          setArticles(selected && !initialArticles.some(article => article.id === selected.id)
            ? mergeArticlesById(initialArticles, [selected])
            : initialArticles);
          setFolderMeta(foldersToMeta(data.folders || [], {}));
          setFolderLoading({});
        } catch (e) {
          showToast('記事一覧の取得に失敗しました', 'error');
        } finally {
          setLoading(false);
        }
      }, [externalFolderUrls]);

      const loadFolder = useCallback(async (folderPath, meta = {}) => {
        const normalizedPath = (folderPath || '').trim().replace(/^\/+|\/+$/g, '');
        if (!normalizedPath) return;
        setFolderLoading(prev => ({ ...prev, [normalizedPath]: true }));
        try {
          const data = await fetchArticles([], {
            raw: true,
            mode: 'shallow',
            folderPath: normalizedPath,
            folderId: meta.id || '',
            h1Limit: 3,
          });
          setArticles(prev => mergeArticlesById(prev, data.articles || []));
          setFolderMeta(prev => {
            const next = foldersToMeta(data.folders || [], prev);
            next[normalizedPath] = { ...(next[normalizedPath] || {}), ...meta, path: normalizedPath, loaded: true };
            return next;
          });
        } catch (e) {
          showToast('フォルダの読み込みに失敗しました', 'error');
        } finally {
          setFolderLoading(prev => {
            const next = { ...prev };
            delete next[normalizedPath];
            return next;
          });
        }
      }, []);

      useEffect(() => { loadArticles(); }, [loadArticles]);

      // デスクトップ判定（リサイズ対応）
      useEffect(() => {
        const handler = () => setIsDesktop(window.innerWidth >= 1024);
        window.addEventListener('resize', handler);
        return () => window.removeEventListener('resize', handler);
      }, []);

      const showToast = (message, type = 'info') => setToast({ message, type });

      // 記事削除
      const handleDeleteArticle = useCallback(async (article) => {
        try {
          await deleteArticleApi(article.id);
          setArticles(prev => prev.filter(a => a.id !== article.id));
          if (selectedArticle?.id === article.id) {
            setSelectedArticle(null);
            setContent('');
            setOriginalContent('');
            setIsNewArticle(false);
          }
          showToast('記事を削除しました', 'success');
        } catch (e) {
          showToast(e.message, 'error');
        }
      }, [selectedArticle]);

      // 記事複製
      const handleDuplicateArticle = useCallback(async (article) => {
        try {
          const copyName = `コピー_${article.name}`;
          const result = await duplicateArticleApi(article.id, copyName, article.path || '');
          const newArticle = {
            id: result.id,
            name: result.name,
            path: article.path || '',
            lastModified: result.lastModified,
            webUrl: result.webUrl,
            size: result.size,
          };
          setArticles(prev => [newArticle, ...prev]);
          showToast('記事を複製しました', 'success');
        } catch (e) {
          showToast(e.message, 'error');
        }
      }, []);

      // Ctrl/Cmd クリック: 個別トグル
      const handleMultiSelect = useCallback((id) => {
        if (id === null) { setMultiSelectedIds(new Set()); return; }
        setMultiSelectedIds(prev => {
          const next = new Set(prev);
          next.has(id) ? next.delete(id) : next.add(id);
          return next;
        });
      }, []);

      // Shift クリック: 最後クリックから今クリックまでの範囲を選択
      const handleRangeSelect = useCallback((fromId, toId) => {
        const ids = articles.map(a => a.id);
        const fi = ids.indexOf(fromId);
        const ti = ids.indexOf(toId);
        if (fi === -1 || ti === -1) return;
        const [lo, hi] = fi < ti ? [fi, ti] : [ti, fi];
        const rangeIds = new Set(ids.slice(lo, hi + 1));
        setMultiSelectedIds(rangeIds);
      }, [articles]);

      // 記事移動（ドラッグ&ドロップ・単一 or 複数対応）
      const handleMoveArticle = useCallback(async (articleOrArray, destFolderPath) => {
        const targets = Array.isArray(articleOrArray) ? articleOrArray : [articleOrArray];
        let successCount = 0;
        for (const article of targets) {
          try {
            await moveArticleApi(article.id, destFolderPath);
            setArticles(prev => prev.map(a =>
              a.id === article.id ? { ...a, path: destFolderPath } : a
            ));
            successCount++;
          } catch (e) {
            showToast(`「${article.name.replace(/^\d{8}_\d{4}_/, '').replace('.md', '')}」の移動失敗: ${e.message}`, 'error');
          }

        if (successCount > 0) {
          const label = successCount === 1
            ? `「${targets[0].name.replace(/^\d{8}_\d{4}_/, '').replace('.md', '')}」を移動しました`
            : `${successCount}件の記事を移動しました`;
          showToast(label, 'success');
        }
        setMultiSelectedIds(new Set()); // 移動後は選択解除
      }, []);

      // 記事選択
      const handleSelect = async (article) => {
        if (hasChanges && !confirm('未保存の変更があります。破棄しますか？')) return;
        setContentLoading(true);
        setIsNewArticle(false);
        setIsEditingTitle(false);
        try {
          const text = await fetchArticleContent(article.id);
          setContent(text);
          setOriginalContent(text);
          setSelectedArticle(article);
          // H1をタイトルとして使用（なければファイル名から抽出）
          const h1Match = text.match(/^#\s+(.+)$/m);
          const h1Title = h1Match ? h1Match[1].trim() : article.name.replace(/^\d{8}_\d{4}_/, '').replace('.md', '');
          setEditedTitle(h1Title);
          // H1をキャッシュ（サイドバー表示用・localStorage永続化）
          if (h1Match) {
            setArticleH1Cache(prev => {
              const next = { ...prev, [article.id]: h1Title };
              try { localStorage.setItem('sb_articleH1Cache', JSON.stringify(next)); } catch { }
              return next;

          }
          // YouTube元動画URLをバックグラウンドで取得（GitHub Variables → localStorage）
          fetch(`/api/youtube-source?name=${encodeURIComponent(article.name)}`)
            .then(r => r.ok ? r.json() : null)

              if (!data?.url) return;

                const next = { ...prev, [article.name]: data.url };
                try { localStorage.setItem('sb_youtubeSrcUrls', JSON.stringify(next)); } catch { }

          // note下書きURLをバックグラウンドで最新取得（エラーは無視してスタックさせない）
          fetchNoteDraftUrl(article.id).then(url => {

              const next = { ...prev, [article.id]: url };

          showToast('記事の読み込みに失敗しました', 'error');

          setContentLoading(false);

      // 新規記事
      const handleNewArticle = () => {
        if (hasChanges && !confirm('未保存の変更があります。破棄しますか？')) return;
        setIsNewArticle(true);

        setContent('# 新しい記事\n\nここに記事を書いてください...\n');

        setNewFilename(`${dateStr}_${timeStr}_新しい記事.md`);

      // 保存（既存記事はfileIDで上書き、新規はルートフォルダに作成）
      // silent=true のとき Toast非表示（自動保存用）
      // H1キャッシュをcontentから抽出して更新するヘルパー
      const updateH1CacheFromContent = useCallback((articleId, text) => {
        if (!articleId) return;
        const h1Match = text.match(/^#\s+(.+)$/m);
        if (!h1Match) return;
        const h1Title = h1Match[1].trim();
        setArticleH1Cache(prev => {
          if (prev[articleId] === h1Title) return prev; // 変化なしなら更新しない
          const next = { ...prev, [articleId]: h1Title };
          try { localStorage.setItem('sb_articleH1Cache', JSON.stringify(next)); } catch { }
          return next;
        });
      }, []);

      const handleSave = async (silent = false) => {
        const filename = isNewArticle ? newFilename : (selectedArticle?.name || '');
        if (!filename) { if (!silent) showToast('ファイル名を指定してください', 'error'); return; }
        if (!silent) setSaving(true);
        try {
          // 既存ファイルはIDで直接上書きして、フォルダ位置を維持する
          const fileId = isNewArticle ? null : (selectedArticle?.id || null);
          const result = await saveArticle(filename, content, fileId);
          setOriginalContent(content);
          if (!silent) showToast('💾 OneDriveに保存しました！', 'success');
          if (isNewArticle && result.id) {
            const newArticle = {
              id: result.id,
              name: result.name || filename,
              path: '',
              lastModified: result.lastModified || new Date().toISOString(),
              webUrl: result.webUrl || '',
              size: result.size || content.length,
            };
            setSelectedArticle(newArticle);
            setArticles(prev => [newArticle, ...prev]);
            // 新規記事保存後にH1キャッシュを更新
            updateH1CacheFromContent(result.id, content);
          } else {
            // 既存記事保存後にH1キャッシュを更新
            updateH1CacheFromContent(selectedArticle?.id, content);
          }
          setIsNewArticle(false);
          setTimeout(async () => {
            try { await loadArticles(); }
            catch (e) { console.warn('一覧再取得失敗（保存は成功）:', e); }
          }, 1500);
        } catch (e) {
          if (!silent) showToast('保存に失敗しました: ' + e.message, 'error');
        } finally {
          if (!silent) setSaving(false);
        }
      };

      // 自動保存（既存記事のみ・2秒デバウンス）
      useEffect(() => {
        if (!selectedArticle || isNewArticle) return;
        if (content === originalContent) return;
        setAutoSaveStatus('pending');
        clearTimeout(autoSaveTimer.current);
        autoSaveTimer.current = setTimeout(async () => {
          try {
            await saveArticle(selectedArticle.name, content, selectedArticle.id);
            setOriginalContent(content);
            setAutoSaveStatus('saved');
            // 自動保存時もH1キャッシュを更新
            updateH1CacheFromContent(selectedArticle.id, content);
            setTimeout(() => setAutoSaveStatus('idle'), 2000);
          } catch { setAutoSaveStatus('idle'); }
        }, 2000);
        return () => clearTimeout(autoSaveTimer.current);
      }, [content]);

      // ── スクロール同期ヘルパー ──────────────────────────
      // 見出しアンカーベースで同期（OGPカードで縦幅が変わっても正確に対応）
      // スクロール同期（エディタ → プレビュー）data-lineベース精密同期
      const handleEditorScroll = useCallback(() => {
        if (previewScrolling.current) return;
        const ta = textareaRef.current;
        const pv = previewRef.current;
        if (!ta || !pv) return;
        editorScrolling.current = true;
        try {
          const lines = ta.value.split('\n');
          const lineH = ta.scrollHeight / Math.max(1, lines.length);
          const topLine = Math.max(0, Math.floor(ta.scrollTop / lineH));
          // data-line属性付きのブロック要素から対応位置を計算
          const annotated = [...pv.querySelectorAll('[data-line]')];
          if (annotated.length >= 2) {
            let prev = annotated[0], next = null;
            for (const el of annotated) {
              const elLine = parseInt(el.dataset.line, 10);
              if (elLine <= topLine) prev = el;
              else if (!next) next = el;
            }
            if (next) {
              const prevLine = parseInt(prev.dataset.line, 10);
              const nextLine = parseInt(next.dataset.line, 10);
              const ratio = Math.max(0, topLine - prevLine) / Math.max(1, nextLine - prevLine);
              pv.scrollTop = prev.offsetTop + ratio * (next.offsetTop - prev.offsetTop);
            } else {
              // 最後の要素より先 → 末尾付近
              const lastEl = annotated[annotated.length - 1];
              pv.scrollTop = lastEl.offsetTop;
            }
          } else {
            // フォールバック: 比率スクロール
            const ratio = ta.scrollTop / Math.max(1, ta.scrollHeight - ta.clientHeight);
            pv.scrollTop = ratio * (pv.scrollHeight - pv.clientHeight);
          }
        } catch { }
        setTimeout(() => { editorScrolling.current = false; }, 60);
      }, []);

      // スクロール同期（プレビュー → エディタ）data-lineベース精密同期
      const handlePreviewScroll = useCallback(() => {
        if (editorScrolling.current) return;
        const ta = textareaRef.current;
        const pv = previewRef.current;
        if (!ta || !pv) return;
        previewScrolling.current = true;
        try {
          const lineCount = ta.value.split('\n').length;
          const lineH = ta.scrollHeight / Math.max(1, lineCount);
          const scrollTop = pv.scrollTop;
          const annotated = [...pv.querySelectorAll('[data-line]')];
          if (annotated.length >= 2) {
            let prev = annotated[0], next = null;
            for (const el of annotated) {
              if (el.offsetTop <= scrollTop + 10) prev = el;
              else if (!next) next = el;
            }
            if (next) {
              const ratio = Math.max(0, scrollTop - prev.offsetTop) / Math.max(1, next.offsetTop - prev.offsetTop);
              const prevLine = parseInt(prev.dataset.line, 10);
              const nextLine = parseInt(next.dataset.line, 10);
              const editorLine = prevLine + ratio * (nextLine - prevLine);
              ta.scrollTop = Math.max(0, editorLine * lineH);
            } else {
              const lastLine = parseInt(prev.dataset.line, 10);
              ta.scrollTop = Math.max(0, lastLine * lineH);
            }
          } else {
            const ratio = scrollTop / Math.max(1, pv.scrollHeight - pv.clientHeight);
            ta.scrollTop = ratio * (ta.scrollHeight - ta.clientHeight);
          }
        } catch { }
        setTimeout(() => { previewScrolling.current = false; }, 60);
      }, []);

      // Enter押下でURL行のOGPをバックグラウンドフェッチ
      const handleKeyDown = useCallback((e) => {
        if (e.key !== 'Enter') return;
        const ta = e.target;
        const pos = ta.selectionStart;
        const lineStart = ta.value.lastIndexOf('\n', pos - 1) + 1;
        const line = ta.value.substring(lineStart, pos).trim();
        if (!line.startsWith('http')) return;
        try {
          new URL(line);
          if (ogpCacheRef.current[line]) return; // キャッシュ済みはスキップ
          // キャンセルされない独立したバックグラウンドフェッチ
          fetch(`/api/ogp?url=${encodeURIComponent(line)}`)
            .then(r => r.ok ? r.json() : null)
            .then(data => {
              if (!data) return;
              const { title, description, image, domain } = data;
              const isGeneric = !title || /^Amazon[\.\s]/.test(title) || title === 'Amazon.co.jp';
              if (isGeneric && !image) return;
              ogpCacheRef.current[line] = { title, description, image, domain };
              const preview = previewRef.current;
              if (!preview) return;
              [...preview.querySelectorAll('a[href]:not(.ogp-card)')].forEach(a => {
                if (a.getAttribute('href') === line && isOgpUrl(a)) {
                  a.dataset.ogpProcessed = '1';
                  insertOgpCard(a, buildOgpCard(line, title, description, image, domain));
                }
              });
            }).catch(() => { });
        } catch { }
      }, []);

      // プレビューのダブルクリック → エディタの対応行をプレビューと同じ高さに揃える
      const handlePreviewDoubleClick = useCallback((e) => {
        const pv = previewRef.current;
        const ta = textareaRef.current;
        if (!pv || !ta) return;

        // クリックされた要素から最も近いdata-line付き祖先を探す
        let el = e.target;
        while (el && el !== pv) {
          if (el.dataset && el.dataset.line !== undefined) break;
          el = el.parentElement;
        }
        if (!el || el === pv) return;

        const elLine = parseInt(el.dataset.line, 10);
        const lineH = ta.scrollHeight / Math.max(1, ta.value.split('\n').length);

        // クリックした要素がプレビューのビューポート内で何px下にあるか
        const pvRect = pv.getBoundingClientRect();
        const elRect = el.getBoundingClientRect();
        const elViewportTop = elRect.top - pvRect.top;

        // エディタ側: 「対応行 - 同じオフセット分」だけスクロールすれば位置が一致する
        editorScrolling.current = true;
        ta.scrollTop = Math.max(0, elLine * lineH - elViewportTop);
        setTimeout(() => { editorScrolling.current = false; }, 80);
      }, []);

      // パイプライン実行
      const handlePipeline = async () => {
        setPipelineRunning(true);
        try {
          await triggerPipeline();
          showToast('🚀 パイプラインを起動しました！GitHub Actionsで進捗を確認してください。', 'info');
        } catch (e) {
          showToast('❌ パイプライン起動に失敗: ' + e.message, 'error');
        } finally {
          setPipelineRunning(false);
        }
      };

      // note下書き投稿（単体 or 複数選択）
      const handleNoteDraft = async () => {
        // 複数選択モード
        const targetIds = selectMode && selectedIds.size > 0
          ? Array.from(selectedIds)
          : selectedArticle ? [selectedArticle.id] : [];

        if (targetIds.length === 0) { showToast('記事を選択してください', 'error'); return; }

        if (hasChanges && !confirm('未保存の変更があります。先に保存しますか？\n「OK」で保存後に投稿、「キャンセル」で現在の保存済み版を投稿')) {
          return;
        }
        if (hasChanges) await handleSave();

        setNoteDraftRunning(true);
        try {
          await triggerNoteDraft(targetIds);
          const count = targetIds.length;
          showToast(`📝 ${count}件のnote下書き投稿を開始しました！GitHub Actionsで進捗を確認してください。`, 'info');
          // 選択モードを解除
          if (selectMode) { setSelectMode(false); setSelectedIds(new Set()); }
          // 完了後にURLをpolling（最大2分、5秒間隔）
          pollDraftUrls(targetIds);
        } catch (e) {
          showToast('❌ note下書き投稿に失敗: ' + e.message, 'error');
        } finally {
          setNoteDraftRunning(false);
        }
      };

      // 完了URLをpollingで取得
      const pollDraftUrls = async (fileIds) => {
        const pending = new Set(fileIds);
        for (let attempt = 0; attempt < 24 && pending.size > 0; attempt++) {
          await new Promise(r => setTimeout(r, 5000));
          for (const id of Array.from(pending)) {
            const url = await fetchNoteDraftUrl(id);
            if (url) {
              setNoteDraftUrls(prev => {
                const next = { ...prev, [id]: url };
                try { localStorage.setItem('sb_noteDraftUrls', JSON.stringify(next)); } catch { }
                return next;
              });
              pending.delete(id);
            }
          }
        }
      };

      // タイトル編集確定（OneDriveでファイルリネーム + articlesリスト更新）
      const commitTitleEdit = async () => {
        if (!selectedArticle || !editedTitle.trim()) {
          setIsEditingTitle(false);
          return;
        }
        const match = selectedArticle.name.match(/^(\d{8}_\d{4}_)/);
        const prefix = match ? match[1] : '';
        const newName = `${prefix}${editedTitle.trim()}.md`;

        // 名前が変わっていなければ何もしない
        if (newName === selectedArticle.name) {
          setIsEditingTitle(false);
          return;
        }

        try {
          const result = await renameArticleApi(selectedArticle.id, newName);
          const renamed = { ...selectedArticle, name: result.name || newName };
          // selectedArticle と articles リストの両方を更新
          setSelectedArticle(renamed);
          setArticles(prev => prev.map(a => a.id === selectedArticle.id ? renamed : a));
          showToast('✏️ タイトルを変更しました', 'success');
        } catch (e) {
          showToast('タイトル変更に失敗しました: ' + e.message, 'error');
        } finally {
          setIsEditingTitle(false);
        }
      };

      // Markdown プレビュー（複数改行を <br> で保持）+ トークン行マップ構築
      const renderedHTML = useMemo(() => {
        try {
          const processed = (content || '').replace(/\n{3,}/g, (m) => {
            const extra = m.length - 2;
            return '\n\n' + Array(extra).fill('<br>').join('\n') + '\n\n';
          });
          // トークン行マップ構築（スクロール同期用）
          try {
            const tokens = marked.lexer(processed);
            const map = [];
            let lineNum = 0;
            for (const token of tokens) {
              if (['paragraph', 'heading', 'code', 'blockquote', 'list', 'table', 'hr', 'html', 'space'].includes(token.type)) {
                if (token.type !== 'space') {
                  map.push({ line: lineNum, type: token.type });
                }
              }
              if (token.raw) lineNum += (token.raw.match(/\n/g) || []).length;
            }
            tokenLineMapRef.current = map;
          } catch { tokenLineMapRef.current = []; }
          return marked.parse(processed);
        } catch { return '<p>Markdownの解析に失敗しました</p>'; }
      }, [content]);

      // プレビュー要素に data-line（ソース行番号）を付与（スクロール同期用）
      useLayoutEffect(() => {
        const pv = previewRef.current;
        if (!pv) return;
        const map = tokenLineMapRef.current;
        if (!map.length) return;
        // プレビュー直下のブロック要素を取得（marked出力の直接子要素）
        const blocks = [...pv.children].filter(el =>
          /^(P|H[1-6]|UL|OL|PRE|BLOCKQUOTE|TABLE|HR|DIV)$/.test(el.tagName)
        );
        let mapIdx = 0;
        for (const el of blocks) {
          if (mapIdx >= map.length) break;
          el.dataset.line = String(map[mapIdx].line);
          mapIdx++;
        }
      }, [renderedHTML]);

      // キャッシュ済みOGPカードをDOMリセット直後に即時再適用（塗り前に実行）
      // → エディタ編集中もOGPカードが消えない
      // ※ renderedHTML の useMemo より後に定義すること（const TDZ回避）
      useLayoutEffect(() => {
        const preview = previewRef.current;
        if (!preview || !Object.keys(ogpCacheRef.current).length) return;
        [...preview.querySelectorAll('a[href^="http"]:not(.ogp-card)')].forEach(a => {
          if (!isOgpUrl(a)) return;
          const href = a.getAttribute('href');
          const cached = ogpCacheRef.current[href];
          if (cached) {
            a.dataset.ogpProcessed = '1'; // 重複fetch防止
            insertOgpCard(a, buildOgpCard(href, cached.title, cached.description, cached.image, cached.domain));
          }
        });
      }, [renderedHTML]);

      // OGPカード変換（renderedHTML変更後にpreview DOMを走査）
      // キャッシュ利用・2並列スタガー・自動リトライ対応
      useEffect(() => {
        const preview = previewRef.current;
        if (!preview) return;
        let aborted = false;

        // 未処理の素URLリンクのみ取得（.ogp-card は絶対除外）
        const getUnprocessed = () =>
          [...preview.querySelectorAll('a[href^="http"]:not(.ogp-card)')].filter(a => {
            if (a.dataset.ogpProcessed) return false;
            return isOgpUrl(a);
          });

        // URLがAmazon系かどうか判定
        const isAmazonHref = (href) =>
          /amazon\.(co\.jp|com|co\.uk|de|fr)/.test(href) ||
          href.includes('amzn.to') || href.includes('amzn.asia');

        const delay = (ms) => new Promise(r => setTimeout(r, ms));

        // Amazon以外: 2並列ワーカー / Amazon: シングルワーカー（長め間隔）
        const runWorkers = async (items) => {
          const queue = [...items];

          const processOne = async (a) => {
            if (!a || a.dataset.ogpProcessed || a.classList.contains('ogp-card')) return false;
            if (!a.isConnected) return false;
            a.dataset.ogpProcessed = '1';
            const href = a.getAttribute('href');
            const isAmz = isAmazonHref(href);
            try {
              const r = await fetch(`/api/ogp?url=${encodeURIComponent(href)}`);
              if (r.ok) {
                const { title, description, image, domain } = await r.json();
                const isGeneric = !title || /^Amazon[\.\s]/.test(title) || title === 'Amazon.co.jp';
                if ((!isGeneric || image) && !aborted && a.isConnected) {
                  ogpCacheRef.current[href] = { title, description, image, domain };
                  insertOgpCard(a, buildOgpCard(href, title, description, image, domain));
                  return true;
                }
              }
            } catch { }
            if (!aborted && a.isConnected) a.removeAttribute('data-ogp-processed');
            return false;
          };

          const amazonItems = queue.filter(a => isAmazonHref(a.getAttribute('href') || ''));
          const otherItems = queue.filter(a => !isAmazonHref(a.getAttribute('href') || ''));

          // Amazon以外: 2並列ワーカー（500ms間隔）
          const runOther = async (startDelay = 0) => {
            if (startDelay) await delay(startDelay);
            while (!aborted) {
              const a = otherItems.shift();
              if (!a) break;
              await processOne(a);
              if (!aborted) await delay(500);
            }
          };

          // Amazon: シングルワーカー（2000ms間隔でレート制限を確実回避）
          const runAmazon = async () => {
            for (const a of amazonItems) {
              if (aborted) break;
              await processOne(a);
              if (!aborted) await delay(2200);
            }
          };

          await Promise.all([runOther(0), runOther(300), runAmazon()]);
        };

        // 最大4回の自動リトライ（失敗リンクが残っていれば2秒後に再実行）
        const processWithRetry = async () => {
          for (let attempt = 0; attempt < 4 && !aborted; attempt++) {
            const items = getUnprocessed();
            if (items.length === 0) break;
            await runWorkers(items);
            if (aborted) break;
            if (getUnprocessed().length === 0) break;
            await delay(2000);
          }
          // 最終フォールバック: 全リトライ後も残った素URLリンクを最低限カード化
          if (!aborted) {
            getUnprocessed().forEach(a => {
              if (!a.isConnected) return;
              const href = a.getAttribute('href') || '';
              let domain = '';
              try { domain = new URL(href).hostname; } catch { }
              if (!domain) return;
              a.dataset.ogpProcessed = '1';
              const asin = href.match(/\/dp\/([A-Z0-9]{10})/)?.[1];
              const fallbackTitle = asin ? `Amazon商品 (${asin})` : null;
              ogpCacheRef.current[href] = { title: fallbackTitle, description: null, image: null, domain };
              insertOgpCard(a, buildOgpCard(href, fallbackTitle, null, null, domain));
            });
          }
        };

        processWithRetry();
        return () => { aborted = true; };
      }, [renderedHTML, ogpTrigger]);

      // OGP更新: .ogp-card（成功済み）は完全スキップ、失敗<a>のみ再試行
      const refreshOgp = useCallback(() => {
        if (previewRef.current) {
          // .ogp-card でない <a> の data-ogp-processed を除去（成功カードに触れない）
          previewRef.current.querySelectorAll('a[data-ogp-processed]:not(.ogp-card)').forEach(a => {
            a.removeAttribute('data-ogp-processed');
          });
        }
        setOgpTrigger(t => t + 1);
      }, []);

      // 検索・置換ナビゲーション
      const goNextMatch = useCallback(() => {
        if (findMatches.length === 0) return;
        const next = (safeMatchIndex + 1) % findMatches.length;
        setMatchIndex(next);
        const pos = findMatches[next];
        const ta = textareaRef.current;
        if (ta) { ta.setSelectionRange(pos, pos + findText.length); ta.focus(); }
      }, [findMatches, safeMatchIndex, findText]);

      const goPrevMatch = useCallback(() => {
        if (findMatches.length === 0) return;
        const prev = (safeMatchIndex - 1 + findMatches.length) % findMatches.length;
        setMatchIndex(prev);
        const pos = findMatches[prev];
        const ta = textareaRef.current;
        if (ta) { ta.setSelectionRange(pos, pos + findText.length); ta.focus(); }
      }, [findMatches, safeMatchIndex, findText]);

      const handleReplaceOne = useCallback(() => {
        if (findMatches.length === 0) return;
        const pos = findMatches[safeMatchIndex];
        const newC = content.substring(0, pos) + replaceText + content.substring(pos + findText.length);
        setContent(newC);
        setMatchIndex(Math.min(safeMatchIndex, Math.max(0, findMatches.length - 2)));
      }, [findMatches, safeMatchIndex, content, findText, replaceText]);

      const handleReplaceAll = useCallback(() => {
        if (findMatches.length === 0) return;
        setContent(content.split(findText).join(replaceText));
        setMatchIndex(0);
      }, [findMatches, content, findText, replaceText]);

      // キーボードショートカット（Ctrl+S / Ctrl+B / Ctrl+Z / Ctrl+F）
      useEffect(() => {
        const handler = (e) => {
          if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); handleSave(); }
          if (e.key === 'Escape' && isEditingTitle) { setIsEditingTitle(false); }
          if (e.key === 'Escape' && showFindReplace) { setShowFindReplace(false); textareaRef.current?.focus(); }
          // Ctrl+F: 検索パネルの開閉
          if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
            e.preventDefault();
            setShowFindReplace(v => { if (!v) setTimeout(() => findInputRef.current?.focus(), 50); return !v; });
          }
          // Ctrl+B: 太字
          if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
            e.preventDefault();
            const ta = textareaRef.current;
            if (ta) {
              const start = ta.selectionStart;
              const end = ta.selectionEnd;
              const sel = content.substring(start, end);
              const newC = content.substring(0, start) + '**' + sel + '**' + content.substring(end);
              setContent(newC);
              setTimeout(() => { ta.selectionStart = start + 2; ta.selectionEnd = end + 2; ta.focus(); }, 0);
            }
          }
          // Ctrl+Z: Undo（アフィリエイトモーダルにフォーカスがある場合はネイティブundoに任せる）
          // Esc: 複数選択解除
          if (e.key === 'Escape' && multiSelectedIds.size > 0) {
            setMultiSelectedIds(new Set());
            return;
          }
          if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
            const active = document.activeElement;
            if (active && active.closest && active.closest('.aff-modal')) return;
            if (undoStack.current.length > 0) {
              e.preventDefault();
              const prev = undoStack.current.pop();
              lastSavedText.current = prev;
              setContent(prev);
            }
          }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [content, selectedArticle, isNewArticle, newFilename, isEditingTitle, showFindReplace, multiSelectedIds]);

      // タイトル編集フォーカス
      useEffect(() => {
        if (isEditingTitle && titleInputRef.current) titleInputRef.current.focus();
      }, [isEditingTitle]);

      return (
        <div className="flex h-screen overflow-hidden">
          {/* サイドバー */}
          <Sidebar
            articles={articles}
            selectedId={selectedArticle?.id}
            onSelect={handleSelect}
            onNewArticle={handleNewArticle}
            loading={loading}
            sidebarWidth={sidebarWidth}
            onResizeStart={onSidebarResizeStart}
            isCollapsed={sidebarCollapsed}
            onToggle={() => setSidebarCollapsed(v => !v)}
            mobileSidebarOpen={mobileSidebarOpen}
            onMobileClose={() => setMobileSidebarOpen(false)}
            onDeleteArticle={handleDeleteArticle}
            onDuplicateArticle={handleDuplicateArticle}
            onMoveArticle={handleMoveArticle}
            selectMode={selectMode}
            selectedIds={selectedIds}
            onToggleSelect={(id) => {
              setSelectedIds(prev => {
                const next = new Set(prev);
                next.has(id) ? next.delete(id) : next.add(id);
                return next;
              });
            }}
            onEnterSelectMode={(article) => {
              setSelectMode(true);
              setSelectedIds(new Set([article.id]));
            }}
            multiSelectedIds={multiSelectedIds}
            onMultiSelect={handleMultiSelect}
            onRangeSelect={handleRangeSelect}
            setAffModalOpen={setAffModalOpen}
            articleH1Cache={articleH1Cache}
            folderMeta={folderMeta}
            folderLoading={folderLoading}
            onLoadFolder={loadFolder}
            externalFolderUrls={externalFolderUrls}
            setExternalFolderUrls={setExternalFolderUrls}
            onRefreshArticles={loadArticles}
          />

          {/* メインコンテンツ */}
          <main className="flex-1 flex flex-col min-w-0 h-screen">
            {/* ツールバー */}
            <header className="bg-white border-b border-slate-200 px-4 py-2.5 flex items-center gap-3 shrink-0 min-h-[52px]">
              {/* ハンバーガーメニュー（モバイルのみ） */}
              <button
                className="lg:hidden p-1.5 text-slate-500 hover:bg-slate-100 rounded-lg transition-colors flex-shrink-0"
                onClick={() => setMobileSidebarOpen(true)}
                id="hamburger-btn"
                title="メニューを開く"
              >
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <path d="M3 12h18M3 6h18M3 18h18" />
                </svg>
              </button>
              {/* ファイル名 / タイトル */}
              <div className="flex-1 min-w-0 flex items-center gap-2">
                {isNewArticle ? (
                  <input
                    type="text"
                    value={newFilename}
                    onChange={(e) => setNewFilename(e.target.value)}
                    className="max-w-xs text-sm font-medium text-slate-700 border border-slate-200 rounded-lg px-3 py-1 focus:outline-none focus:ring-2 focus:ring-[#7C4DFF] focus:border-transparent"
                    placeholder="ファイル名.md"
                    id="filename-input"
                  />
                ) : selectedArticle ? (
                  <div className="flex items-center gap-1.5 min-w-0">
                    {isEditingTitle ? (
                      <div className="flex items-center gap-1.5 flex-1 min-w-0">
                        <input
                          ref={titleInputRef}
                          type="text"
                          value={editedTitle}
                          onChange={(e) => setEditedTitle(e.target.value)}
                          onBlur={commitTitleEdit}
                          onKeyDown={(e) => { if (e.key === 'Enter') commitTitleEdit(); }}
                          className="title-input text-slate-800 bg-slate-50 border border-[#7C4DFF] rounded px-2 py-0.5 focus:outline-none max-w-sm"
                          id="title-edit-input"
                        />
                        <button onClick={commitTitleEdit} className="text-[#7C4DFF] hover:text-[#651FFF] p-1 rounded" title="確定">
                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M20 6L9 17l-5-5" /></svg>
                        </button>

                        // amazon.co.jp/dp/{ASIN}/ref=nosim?tag=hiroshit-22 形式の行を削除
                        const AMAZON_RE = /^https:\/\/www\.amazon\.co\.jp\/dp\/[A-Z0-9]{10}\/ref=nosim\?tag=hiroshit-22$/;
                        const lines = content.split('\n');
                        // 削除対象行のインデックスを収集
                        const removeIdx = new Set(
                          lines.reduce((acc, ln, i) => {
                            if (AMAZON_RE.test(ln.trim())) acc.push(i);
                            return acc;
                          }, [])
                        );
                        if (removeIdx.size === 0) { showToast('削除対象のAmazonリンクが見つかりません', 'error'); return; }
                        // 該当行とその前後の空行を除去
                        const filtered = lines.filter((ln, i) => {
                          if (removeIdx.has(i)) return false;
                          // 前後がリンク行だった空行も除去（連続空行を1つに正規化）
                          const prevIsLink = removeIdx.has(i - 1);
                          const nextIsLink = removeIdx.has(i + 1);
                          if ((prevIsLink || nextIsLink) && ln.trim() === '') return false;
                          return true;
                        });
                        // 連続する空行を最大2行に正規化
                        const normalized = [];
                        let blankCount = 0;
                        for (const ln of filtered) {
                          if (ln.trim() === '') { blankCount++; if (blankCount <= 2) normalized.push(ln); }
                          else { blankCount = 0; normalized.push(ln); }
                        }
                        setContent(normalized.join('\n'));
                        showToast(`Amazonアフィリエイトリンクを${removeIdx.size}件削除しました`, 'success');

                          const lines = content.split('\n');
                          // H2行のインデックスを収集（1-indexed count）
                          const h2Indices = [];
                          lines.forEach((ln, i) => { if (/^## /.test(ln)) h2Indices.push(i); });
                          if (h2Indices.length < 2) { showToast('H2見出しが2つ以上必要です', 'error'); return; }
                          // 偶数番目（2,4,6...→0-indexed: 1,3,5...）の直前に挿入（逆順で行番号ズレ防止）
                          const targets = h2Indices.filter((_, idx) => idx % 2 === 1).reverse();
                          const insertBlock = `\n${clip.trim()}\n`;
                          let result = [...lines];
                          for (const lineIdx of targets) {
                            result = [...result.slice(0, lineIdx), '', clip.trim(), '', ...result.slice(lineIdx)];
                          }
                          setContent(result.join('\n'));
                          showToast(`${targets.length}箇所にリンクを挿入しました`, 'success');
                        } catch { showToast('クリップボードの読み取りに失敗しました', 'error'); }
                      }}

                />
                <span className="text-slate-400 text-xs whitespace-nowrap shrink-0 min-w-[2.5rem] text-right">
                  {findText ? (findMatches.length > 0 ? `${safeMatchIndex + 1}/${findMatches.length}` : '0件') : ''}
                </span>
                <button onClick={goPrevMatch} disabled={findMatches.length === 0} className="p-1 rounded hover:bg-slate-100 text-slate-500 disabled:opacity-30" title="前へ">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 15l-6-6-6 6" /></svg>
                </button>
                <button onClick={goNextMatch} disabled={findMatches.length === 0} className="p-1 rounded hover:bg-slate-100 text-slate-500 disabled:opacity-30" title="次へ">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M6 9l6 6 6-6" /></svg>
                </button>
                <button onClick={() => { setShowFindReplace(false); textareaRef.current?.focus(); }} className="p-1 rounded hover:bg-slate-100 text-slate-500" title="閉じる">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 6L6 18M6 6l12 12" /></svg>
                </button>
              </div>
              <div className="flex items-center gap-1 px-2 py-1.5">
                <svg className="text-slate-400 shrink-0" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 7h16M4 12h10M4 17h13" /><path d="M20 14l-3 3 3 3" /></svg>
                <input ref={replaceInputRef} value={replaceText}
                  onChange={e => setReplaceText(e.target.value)}
                  onKeyDown={e => {
                    if (e.key === 'Enter') { e.preventDefault(); handleReplaceOne(); }
                    if (e.key === 'Escape') { setShowFindReplace(false); textareaRef.current?.focus(); }
                  }}
                  placeholder="置換"
                  className="flex-1 border border-slate-200 rounded px-1.5 py-0.5 text-slate-700 focus:outline-none focus:border-[#7C4DFF] text-xs"
                  style={{ minWidth: 0 }}
                />
                <button onClick={handleReplaceOne} disabled={findMatches.length === 0} className="flex items-center gap-1 px-2 py-0.5 rounded text-xs font-medium bg-slate-100 hover:bg-slate-200 text-slate-600 disabled:opacity-30 whitespace-nowrap" title="1件置換">
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M7 16V4m0 0L3 8m4-4l4 4" /><path d="M17 8v12m0 0l4-4m-4 4l-4-4" /></svg>1件
                </button>
                <button onClick={handleReplaceAll} disabled={findMatches.length === 0} className="flex items-center gap-1 px-2 py-0.5 rounded text-xs font-medium bg-slate-100 hover:bg-slate-200 text-slate-600 disabled:opacity-30 whitespace-nowrap" title="全て置換">
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 16V4m0 0L1 7m3-3l3 3" /><path d="M10 16V4m0 0L7 7m3-3l3 3" /><path d="M20 8v12m0 0l-3-3m3 3l3-3" /></svg>全て
                </button>
              </div>
            </div>
          )}

          {/* アフィリンクモーダル */}
          <AffiliateLinkModal isOpen={affModalOpen} onClose={() => setAffModalOpen(false)} showToast={showToast} />

          {/* トースト */}
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </div>
      );
    }

    // === マウント ===
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
